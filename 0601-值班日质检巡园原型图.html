function elapsedDaysSince(timeStr) {

function isTicketInTimeRange(t, timeRange) {
  if (timeRange === '全部') return true;

  if (timeRange === '近一周') return elapsedDaysSince(t.time) <= TICKET_LIST_WEEK_DAYS;
  if (timeRange === '近一月') return elapsedDaysSince(t.time) <= TICKET_LIST_MONTH_DAYS;
  return true;
}

  if (statusFilter === '待处理' || statusFilter === '不整改') return true;

}

  if (t.urgent === '立即处理' && (t.status === '待处理' || t.status === '不整改申请中')) return 0;
  if (t.status === '待处理') return elapsedDaysSince(t.time) >= 7 ? 1 : 2;

}
function sortTicketsForList(list, statusFilter) {
  const items = [...list];
  if (statusFilter === '待处理') {
    return items.sort((a, b) => {
      const tierDiff = getPendingSortTier(a) - getPendingSortTier(b);
      if (tierDiff !== 0) return tierDiff;
      return elapsedDaysSince(b.time) - elapsedDaysSince(a.time);
    });
  }
  if (statusFilter === '已整改') {
    return items.sort((a, b) => parseTicketTimeMs(b.doneTime || b.time) - parseTicketTimeMs(a.doneTime || a.time));
  }
  if (statusFilter === '不整改') {
    return items.sort((a, b) => parseTicketTimeMs(b.auditTime || b.time) - parseTicketTimeMs(a.auditTime || a.time));
  }
  return items.sort((a, b) => parseTicketTimeMs(b.time) - parseTicketTimeMs(a.time));
}

const SWIPE_DELETE_WIDTH = 72;

function SwipeableNotificationRow({ onDelete, onClick, isLast, children }) {
  const [offsetX, setOffsetX] = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const startX = React.useRef(0);
  const startOffset = React.useRef(0);
  const offsetRef = React.useRef(0);
  const moved = React.useRef(false);

  const applyOffset = (x) => {
    const v = Math.min(0, Math.max(-SWIPE_DELETE_WIDTH, x));
    offsetRef.current = v;
    setOffsetX(v);
  };

  const onStart = (clientX) => {
    startX.current = clientX;
    startOffset.current = offsetRef.current;
    moved.current = false;
    setDragging(true);
  };
  const onMove = (clientX) => {
    if (!dragging) return;
    const dx = clientX - startX.current;
    if (Math.abs(dx) > 4) moved.current = true;
    applyOffset(startOffset.current + dx);
  };
  const onEnd = () => {
    if (!dragging) return;
    setDragging(false);
    if (offsetRef.current <= -SWIPE_DELETE_WIDTH / 2) {
      onDelete();
    } else {
      applyOffset(0);
    }
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onMouseMove = (e) => onMove(e.clientX);
    const onMouseUp = () => onEnd();
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return () => {
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
    };
  }, [dragging]);

  const handleContentClick = () => {
    if (moved.current || offsetRef.current < -8) return;
    onClick && onClick();
  };

  return (
    <div style={{ position: 'relative', overflow: 'hidden', borderBottom: isLast ? 'none' : `0.5px solid ${C.line}` }}>
      <button type="button" onClick={(e) => { e.stopPropagation(); onDelete(); }} style={{
        position: 'absolute', right: 0, top: 0, bottom: 0, width: SWIPE_DELETE_WIDTH,
        background: C.danger, color: '#fff', border: 'none', fontSize: 14, fontWeight: 500,
        cursor: 'pointer', fontFamily: FONT,
      }}>删除</button>
      <div
        onClick={handleContentClick}
        onTouchStart={(e) => onStart(e.touches[0].clientX)}
        onTouchMove={(e) => onMove(e.touches[0].clientX)}
        onTouchEnd={onEnd}
        onMouseDown={(e) => onStart(e.clientX)}
        style={{
          transform: `translateX(${offsetX}px)`,
          transition: dragging ? 'none' : 'transform 0.2s ease',
          background: C.surface,
          cursor: 'pointer',
          touchAction: 'pan-y',
        }}
      >
        {children}
      </div>
    </div>
  );
}

  const PHOTO_BORDER = '#E5E7EB';
  const INPUT_BORDER = '#D1D5DB';
  const CONFIRM_NORMAL_BTN = { enabled: '#22C55E', pressed: '#16A34A' };
  const [btnPressed, setBtnPressed] = React.useState(false);
  const tagStyle = tag === '必查' ? { color: '#666', background: '#F5F5F5' } : { color: C.warn, background: '#FFF7E8' };
  const isDone = state === 'done';
  const isIssue = state === 'issue';
  const canConfirm = photos.length > 0;
  const checkSelected = expanded || isDone;

  const syncNoteHeight = () => {
    const el = noteRef.current;
    if (!el) return;
    el.style.height = '36px';
    el.style.height = `${Math.max(36, Math.min(el.scrollHeight, 80))}px`;
  };

  React.useLayoutEffect(() => {
    if (expanded) syncNoteHeight();
  }, [note, expanded]);

  const collapse = () => { setExpanded(false); setPhotos([]); setNote(''); setSubmitting(false); setBtnPressed(false); };

  const handleCheckClick = (e) => {
    e.stopPropagation();
    if (isDone || isIssue) return;
    if (expanded) collapse();
    else setExpanded(true);
  };

  const handleRowClick = () => {
    if (expanded) collapse();
    else onSOP();
  };

  const handleReportClick = (e) => {
    e.stopPropagation();
    if (isDone) return;
    collapse();
    onReport();
  };

  const handleConfirm = (e) => {
    e.stopPropagation();
    if (!canConfirm || submitting) return;
    setSubmitting(true);
    window.setTimeout(() => {
      onConfirm();
      collapse();
    }, 550);
  };

  const addPhoto = (e) => {
    e.stopPropagation();
    if (photos.length >= maxPhotos) return;
    onShowMediaPicker(() => {
      setPhotos(p => p.length < maxPhotos ? [...p, { id: Date.now() }] : p);
    });
  };

  const removePhoto = (e, i) => {
    e.stopPropagation();
    setPhotos(p => p.filter((_, j) => j !== i));
  };

  const thumbBox = (child) => ({
    width: THUMB, height: THUMB, borderRadius: 8, flexShrink: 0,
    background: '#fff', border: `1px dashed ${PHOTO_BORDER}`,
    display: 'flex', alignItems: 'center', justifyContent: 'center',
  });

  const photoHint = photos.length > 0
    ? `已选 ${photos.length} 张，可继续添加`
    : '请添加照片（至少1张）';

  return (
    <div style={{ background: '#fff', borderBottom: isLast ? 'none' : `0.5px solid ${C.line}` }}>
      <div style={{ display: 'flex', alignItems: 'center', minHeight: 48, padding: '0 16px', gap: 8 }}>
        <div onClick={handleRowClick} style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', minWidth: 0 }}>
          {(isDone || isIssue) && !expanded && (
            <span style={{ width: 4, height: 4, borderRadius: 2, background: isDone ? C.success : C.danger, flexShrink: 0 }} />
          )}
          <span style={{ fontSize: 14, color: isDone ? C.textTer : C.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{name}</span>
          <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 4, flexShrink: 0, ...tagStyle }}>{tag}</span>
        </div>
        <div style={{ display: 'flex', gap: 6, flexShrink: 0, alignItems: 'center' }}>
          <div onClick={handleCheckClick} title={checkSelected ? '已选中' : '确认正常'} style={{
            width: 36, height: 32, borderRadius: 8,
            background: isDone || checkSelected ? C.success : C.successSoft,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: isDone || isIssue ? 'default' : 'pointer',
            opacity: isIssue && !isDone ? 0.45 : 1,
            flexShrink: 0,
          }}>
            <svg width="15" height="11" viewBox="0 0 16 12" fill="none"><path d="M1.5 6l4 4 9-9" stroke={isDone || checkSelected ? '#fff' : C.success} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          <div onClick={!isDone ? handleReportClick : undefined} title="标记异常" style={{
            width: 36, height: 32, borderRadius: 8,
            background: isIssue ? C.danger : C.dangerSoft,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: isDone ? 'default' : 'pointer',
            opacity: isDone ? 0.35 : 1,
            flexShrink: 0,
          }}>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 1.5l9 9M10.5 1.5l-9 9" stroke={isIssue ? '#fff' : '#999'} strokeWidth="2" strokeLinecap="round"/></svg>
          </div>
        </div>
      </div>
      {expanded && (
        <div style={{ background: EXPAND_BG, padding: '12px 16px', borderTop: '1px solid #E8F0EB' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, minHeight: THUMB }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
              {photos.map((p, i) => (
                <div key={p.id} style={{ position: 'relative', flexShrink: 0 }}>
                  <div style={thumbBox()}>
                    <svg width="16" height="14" viewBox="0 0 28 26" fill="none"><path d="M2 7h5l2.5-4h9L21 7h5v17H2z" stroke="#9CA3AF" strokeWidth="1.5"/><circle cx="14" cy="15.5" r="4" stroke="#9CA3AF" strokeWidth="1.5"/></svg>
                  </div>
                  <button type="button" onClick={(e) => removePhoto(e, i)} style={{ position: 'absolute', top: -4, right: -4, width: 14, height: 14, borderRadius: 7, background: 'rgba(0,0,0,0.55)', border: 'none', color: '#fff', fontSize: 9, cursor: 'pointer', fontFamily: FONT, lineHeight: 1 }}>✕</button>
                </div>
              ))}
              {photos.length < maxPhotos && (
                <button type="button" onClick={addPhoto} aria-label="添加照片"
                  onMouseEnter={() => setAddPhotoHover(true)} onMouseLeave={() => { setAddPhotoHover(false); setAddPhotoActive(false); }}
                  onMouseDown={() => setAddPhotoActive(true)} onMouseUp={() => setAddPhotoActive(false)}
                  style={{
                    ...thumbBox(),
                    border: `1px dashed ${PHOTO_BORDER}`,
                    background: (addPhotoHover || addPhotoActive) ? '#F9FAFB' : '#fff',
                    cursor: 'pointer', fontFamily: FONT, padding: 0,
                  }}>
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="#9CA3AF" strokeWidth="2" strokeLinecap="round"/></svg>
                </button>
              )}
            </div>
            <div style={{ flex: 1, minWidth: 0, fontSize: 12, color: C.textTer, lineHeight: 1.4, display: 'flex', alignItems: 'center' }}>{photoHint}</div>
          </div>
          <textarea
            ref={noteRef}
            value={note}
            onChange={e => { setNote(e.target.value); syncNoteHeight(); }}
            onClick={e => e.stopPropagation()}
            onFocus={() => setNoteFocused(true)}
            onBlur={() => setNoteFocused(false)}
            placeholder={NOTE_PLACEHOLDER}
            rows={1}
            style={{
              width: '100%', marginTop: 8, height: 36, minHeight: 36, maxHeight: 80, padding: '8px 12px',
              fontSize: 14, color: C.text, lineHeight: '20px',
              border: `1px solid ${noteFocused ? CONFIRM_NORMAL_BTN.enabled : INPUT_BORDER}`, borderRadius: 8, background: '#fff',
              fontFamily: FONT, resize: 'none', outline: 'none', boxSizing: 'border-box',
              overflow: 'hidden', transition: 'border-color 0.15s ease',
            }}
          />
          <div style={{ marginTop: 10 }}>
            {!canConfirm && !submitting ? (
              <div role="status" aria-live="polite" style={{
                height: 36, borderRadius: 8, background: '#F3F4F6',
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                padding: '0 12px', userSelect: 'none', pointerEvents: 'none',
              }}>
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden>
                  <circle cx="8" cy="8" r="7" stroke="#6B7280" strokeWidth="1.2"/>
                  <path d="M8 7v4" stroke="#6B7280" strokeWidth="1.3" strokeLinecap="round"/>
                  <circle cx="8" cy="5" r="0.8" fill="#6B7280"/>
                </svg>
                <span style={{ fontSize: 13, color: '#6B7280', lineHeight: 1.3 }}>请先添加照片（至少 1 张）</span>
              </div>
            ) : (
              <button
                type="button"
                onClick={handleConfirm}
                disabled={submitting}
                onMouseDown={() => !submitting && setBtnPressed(true)}
                onMouseUp={() => setBtnPressed(false)}
                onMouseLeave={() => setBtnPressed(false)}
                style={{
                  width: '100%', height: 44, borderRadius: 8, border: 'none', fontFamily: FONT,
                  fontSize: 16, fontWeight: 600,
                  cursor: submitting ? 'not-allowed' : 'pointer',
                  background: submitting || btnPressed ? CONFIRM_NORMAL_BTN.pressed : CONFIRM_NORMAL_BTN.enabled,
                  color: '#fff',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                }}
              >
                {submitting ? (
                  <>
                    <span style={{
                      width: 14, height: 14, borderRadius: '50%', flexShrink: 0,
                      border: '2px solid rgba(255,255,255,0.35)', borderTopColor: '#fff',
                      animation: 'xytSpin 0.7s linear infinite',
                    }} />
                    提交中...
                  </>
                ) : '确认正常'}
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function SectionGroup({ icon: Icon, iconColor, title, count, done, items, states, onConfirm, onReport, onSOP, onShowMediaPicker }) {
  const [open, setOpen] = React.useState(false);
  const allDone = done === count;
  return (
    <div>
      <div onClick={() => setOpen(o => !o)} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '0 16px', height: 40, cursor: 'pointer', background: C.bg }}>
        <Icon color={iconColor} size={16} />
        <span style={{ fontSize: 13, fontWeight: 500, color: C.textSec, flex: 1, letterSpacing: 0.2 }}>{title}</span>
        <span style={{ fontSize: 12, color: C.textTer, marginRight: 6, fontFamily: MONO }}>
          {done}<span style={{ color: '#CCC' }}>/</span>{count}
        </span>
        <IconChevronDown open={open} />
      </div>
      {open && (
        <div style={{ background: '#fff' }}>
          {items.map((item, i) => (
            <TaskItem key={i} name={item.name} tag={item.tag || '必查'} state={states[i]}
              onConfirm={() => onConfirm(i)} onReport={() => onReport(i, item)} onSOP={() => onSOP(item.name)}
              onShowMediaPicker={onShowMediaPicker} isLast={i === items.length - 1} />
          ))}
        </div>
      )}
    </div>
  );
}

function ProgressBar({ value, total }) {
  const pct = total ? Math.round((value / total) * 100) : 0;
  const remaining = total - value;
  return (
    <div style={{ padding: '16px 16px 18px', background: '#fff', borderBottom: `0.5px solid ${C.line}` }}>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
          <span style={{ fontSize: 24, fontWeight: 600, color: C.text, fontFamily: MONO, lineHeight: 1 }}>{pct}</span>
          <span style={{ fontSize: 14, color: C.textSec, fontWeight: 500 }}>%</span>
          <span style={{ fontSize: 12, color: C.textTer, marginLeft: 8 }}>今日完成率</span>
        </div>
        <span style={{ fontSize: 12, color: C.textTer }}>
          已完成 <span style={{ color: C.text, fontWeight: 500 }}>{value}</span>
          <span style={{ margin: '0 4px' }}>·</span>
          剩余 <span style={{ color: remaining > 0 ? C.warn : C.success, fontWeight: 500 }}>{remaining}</span> 项
        </span>
      </div>
      <div style={{ height: 4, borderRadius: 2, background: C.line, overflow: 'hidden' }}>
        <div style={{ height: '100%', borderRadius: 2, background: C.brand, width: `${pct}%`, transition: 'width .4s' }} />
      </div>
    </div>
  );
}

function inferCatFromDesc(text) {
  const t = text;
  if (/灯|灯箱|标识|护栏|设施|设备|螺丝|门锁|照明|破损|损坏|松动|故障/.test(t)) return '设施设备';
  if (/卫生|油污|异味|脏|垃圾|洗手|厕所|卫生间|气味/.test(t)) return '卫生管理';
  if (/消防|安全|疏散|占用|通道/.test(t)) return '安全管理';
  if (/演出|表演|千古情|座椅|舞台/.test(t)) return '演出管理';
  if (/氛围|灯笼|布置|装饰/.test(t)) return '氛围管理';
  if (/服务|态度|礼仪|仪容/.test(t)) return '服务状态';
  if (/餐饮|食品|档口/.test(t)) return '餐饮管理';
  if (/店铺|商铺|柜台/.test(t)) return '店铺管理';
  if (/施工|用电|工程/.test(t)) return '工程管理';
  return '';
}

function inferDeptFromDesc(text, cat) {
  const t = text;
  if (/灯|灯箱|标识|护栏|照明|设施|设备|螺丝|门锁|破损|损坏|松动|故障/.test(t)) return '工程部';
  if (/消防|安全|疏散/.test(t)) return '安全部';
  if (/卫生|油污|异味|洗手|厕所|卫生间|气味|垃圾/.test(t)) return '商业管理部';
  if (/演出|千古情|座椅|舞台|表演/.test(t)) return '剧场部';
  if (/后勤|仓库|库房|采购|货架/.test(t)) return '采购部';
  if (/餐饮|档口|食品/.test(t)) return '餐饮部';
  if (/服务|仪容/.test(t)) return '人力资源部';
  if (cat === '设施设备' || cat === '工程管理') return '工程部';
  if (cat === '卫生管理') return '商业管理部';
  if (cat === '安全管理') return '安全部';
  if (cat === '演出管理') return '剧场部';
  return '';
}

function inferAreaFromDesc(text) {
  const t = text;
  if (/河坊街|水街|宋城大道|怪街|街区/.test(t)) return '街区';
  if (/洗手间|厕所|卫生间/.test(t)) return '洗手间';
  if (/后勤|仓库|库房|办公/.test(t)) return '后勤区';
  if (/剧院|剧场|千古情|座椅/.test(t)) return '剧院';
  if (/广场|大门|入口/.test(t)) return '广场';
  if (/店铺|商铺|档口|餐饮/.test(t)) return '店铺';
  return '';
}

function formatTicketDate(timeStr) {
  const m = String(timeStr || '').match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return '';
  return `${parseInt(m[2], 10)}月${parseInt(m[3], 10)}日`;
}

function findSimilarTicket(cat, dept, loc) {
  if (!cat || !dept || !loc) return null;
  return TICKETS.find(t =>
    t.cat === cat && t.dept === dept && t.loc === loc &&
    t.status !== '已整改' && t.status !== '不整改'
  ) || null;
}

function ReportScreen({ sourceItem, onBack, onSubmit, onViewTicket }) {
  const rec = sourceItem ? (ITEM_RECOMMENDATIONS[sourceItem.name] || { cat: '其他', dept: '运营部' }) : null;
  const [voiceRecording, setVoiceRecording] = React.useState(false);
  const [voiceDuration, setVoiceDuration] = React.useState(0);
  const [desc, setDesc] = React.useState('');
  const [submitted, setSubmitted] = React.useState(false);
  const [areaType, setAreaType] = React.useState('');
  const [detailLoc, setDetailLoc] = React.useState('');
  const [cat, setCat] = React.useState(rec?.cat || '');
  const [dept, setDept] = React.useState(rec?.dept || '');
  const [deptAiRecommended, setDeptAiRecommended] = React.useState(false);
  const [deptModified, setDeptModified] = React.useState(false);
  const aiDeptRef = React.useRef('');
  const [itemRecommended, setItemRecommended] = React.useState(!!rec?.cat);
  const [urgent, setUrgent] = React.useState('常规');
  const [showAreaPicker, setShowAreaPicker] = React.useState(false);
  const [showCatPicker, setShowCatPicker] = React.useState(false);
  const [showDeptPicker, setShowDeptPicker] = React.useState(false);
  const [showMediaPicker, setShowMediaPicker] = React.useState(false);
  const [photos, setPhotos] = React.useState([]);
  const [similarDismissed, setSimilarDismissed] = React.useState(false);
  const [aiAnalyzing, setAiAnalyzing] = React.useState(false);
  const [aiFieldsReveal, setAiFieldsReveal] = React.useState(true);
  const [areaAutoDetected, setAreaAutoDetected] = React.useState(false);
  const areaAutoRef = React.useRef(false);
  React.useEffect(() => { areaAutoRef.current = areaAutoDetected; }, [areaAutoDetected]);

  const deptBadge = deptModified ? '已修改' : (deptAiRecommended && dept ? 'AI推荐' : null);
  const descReady = desc.trim().length > 5;
  const pendingRecHint = descReady ? '待推荐' : '请选择';
  const similarTicket = React.useMemo(() => {
    if (similarDismissed || !cat || !dept || !areaType) return null;
    return findSimilarTicket(cat, dept, areaType);
  }, [cat, dept, areaType, similarDismissed]);

  React.useEffect(() => { setSimilarDismissed(false); }, [cat, dept, areaType]);
  const canSubmit = desc.trim().length > 0 && photos.length > 0 && areaType && cat && dept;

  React.useEffect(() => {
    let timer;
    if (voiceRecording) timer = setInterval(() => setVoiceDuration(d => d + 0.1), 100);
    return () => clearInterval(timer);
  }, [voiceRecording]);

  React.useEffect(() => {
    const text = desc.trim();
    if (text.length <= 5) {
      setAiAnalyzing(false);
      return;
    }
    setAiAnalyzing(true);
    const timer = setTimeout(() => {
      const inferredCat = inferCatFromDesc(text);
      const inferredDept = inferDeptFromDesc(text, inferredCat);
      const inferredArea = inferAreaFromDesc(text);
      setAiFieldsReveal(false);
      requestAnimationFrame(() => {
        if (inferredCat) { setCat(inferredCat); setItemRecommended(true); }
        if (inferredDept) {
          setDept(inferredDept);
          setDeptAiRecommended(true);
          setDeptModified(false);
          aiDeptRef.current = inferredDept;
        }
        if (inferredArea) {
          setAreaType(inferredArea);
          setAreaAutoDetected(true);
        } else if (areaAutoRef.current) {
          setAreaType('');
          setAreaAutoDetected(false);
        }
        setAiAnalyzing(false);
        requestAnimationFrame(() => setAiFieldsReveal(true));
      });
    }, 500);
    return () => clearTimeout(timer);
  }, [desc]);

  const voiceToText = (append) => {
    setDesc(prev => {
      const t = prev.trim();
      if (append && t) return `${t} ${VOICE_MOCK_DESC}`;
      return VOICE_MOCK_DESC;
    });
  };
  const userSetCat = (v) => { setCat(v); setItemRecommended(false); };
  const userSetArea = (v) => { setAreaType(v); setAreaAutoDetected(false); };
  const selectDept = (d) => {
    setDept(d);
    if (deptAiRecommended && d !== aiDeptRef.current) setDeptModified(true);
    setShowDeptPicker(false);
  };
  const addMedia = (type) => {
    if (photos.length >= MAX_MEDIA) return;
    setShowMediaPicker(false);
    setPhotos(p => [...p, { id: Date.now(), type }]);
  };
  const removeMedia = (i) => setPhotos(p => p.filter((_, j) => j !== i));
  const submit = () => { setSubmitted(true); setTimeout(() => onSubmit && onSubmit(), 1500); };

  const getBottomHint = () => {
    if (canSubmit) return '确认提交并派单';
    if (aiAnalyzing) return 'AI正在分析...';
    if (!desc.trim()) return '请先描述问题';
    if (photos.length === 0) return '请先拍照上传';
    if (!areaType) return '请选择所在区域';
    if (!dept) return '请完善必填项';
    if (!cat) return '请完善必填项';
    return '请完善必填项';
  };

  if (submitted) {
    return (
      <div style={{ flex: 1, background: C.surface, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 28, textAlign: 'center' }}>
        <div style={{ width: 72, height: 72, borderRadius: 36, background: C.successSoft, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20 }}>
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M8 18l7 7 13-13" stroke={C.success} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{ fontSize: 20, fontWeight: 600, color: C.text, marginBottom: 8 }}>提交成功</div>
        <div style={{ fontSize: 14, color: C.textSec, lineHeight: 1.7 }}>工单 GD20260429008<br/>已自动派发至 <strong style={{ color: C.text }}>{dept}</strong></div>
      </div>
    );
  }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.bg, overflow: 'hidden', position: 'relative' }}>
      <TopBar title={sourceItem ? '异常上报' : '问题上报'} onBack={onBack} />
      <div style={{ flex: 1, overflowY: 'auto', WebkitOverflowScrolling: 'touch', paddingBottom: SCROLL_PAD_STICKY_FOOTER }}>
        {sourceItem && (
          <div style={{ margin: '8px 12px 0', padding: '6px 10px', background: C.surface, borderRadius: 6, fontSize: 12, color: C.textSec }}>
            来源 <span style={{ color: C.text, fontWeight: 500 }}>{sourceItem.name} · {sourceItem.tag}</span>
          </div>
        )}
        <div style={{ margin: sourceItem ? 8 : 10, marginBottom: 8, background: C.surface, borderRadius: 12, overflow: 'hidden' }}>
          <div style={REPORT_BLOCK_PAD}>
            <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10 }}>
              <span style={{ fontSize: 13, color: C.text, fontWeight: 500 }}>上传照片 <span style={{ color: C.textTer, fontWeight: 400 }}>· 至少 1 张</span></span>
              <span style={{ fontSize: 11, color: photos.length > 0 ? C.success : C.textTer, fontFamily: MONO }}>
                {photos.length > 0 ? `${photos.length}/${MAX_MEDIA} ✓` : `0/${MAX_MEDIA}`}
              </span>
            </div>
            <div style={{ display: 'flex', gap: 8, overflowX: 'auto' }}>
              {photos.map((p, i) => (
                <div key={p.id} style={{ position: 'relative', flexShrink: 0 }}>
                  <div style={{ width: MEDIA_THUMB, height: MEDIA_THUMB, borderRadius: 8, background: C.surfaceAlt, border: `1px solid ${C.line}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <svg width="22" height="20" viewBox="0 0 28 26" fill="none"><path d="M2 7h5l2.5-4h9L21 7h5v17H2z" stroke={C.textTer} strokeWidth="1.5"/><circle cx="14" cy="15.5" r="4" stroke={C.textTer} strokeWidth="1.5"/></svg>
                  </div>
                  <button onClick={() => removeMedia(i)} style={{ position: 'absolute', top: -5, right: -5, width: 18, height: 18, borderRadius: 9, background: 'rgba(0,0,0,0.55)', border: 'none', color: '#fff', fontSize: 12, cursor: 'pointer', fontFamily: FONT }}>✕</button>
                </div>
              ))}
              {photos.length < MAX_MEDIA && (
                <button onClick={() => setShowMediaPicker(true)} style={{ width: MEDIA_THUMB, height: MEDIA_THUMB, flexShrink: 0, borderRadius: 8, border: `1.5px dashed ${C.lineStrong}`, background: C.surfaceAlt, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2, cursor: 'pointer', fontFamily: FONT }}>
                  <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke={C.textTer} strokeWidth="1.8" strokeLinecap="round"/></svg>
                  <span style={{ fontSize: 10, color: C.textTer }}>添加</span>
                </button>
              )}
            </div>
          </div>
          {similarTicket && (
            <SimilarTicketBanner
              ticket={similarTicket}
              onView={(t) => onViewTicket && onViewTicket(t)}
              onDismiss={() => setSimilarDismissed(true)}
            />
          )}
          <div style={{ height: 12, background: C.bg }} />
          <div style={{ paddingTop: 12, opacity: aiFieldsReveal ? 1 : 0, transition: 'opacity 300ms ease' }}>
            <FieldRow compact label="问题类别"
              value={cat || (descReady ? '待推荐' : '请选择')}
              placeholder={!cat}
              aiFilled={!!cat && itemRecommended}
              badge={itemRecommended && cat ? '推荐' : undefined}
              onClick={() => setShowCatPicker(true)} />
            <Hairline inset={12} />
            <DeptConfirmField dept={dept} badge={deptBadge}
              emptyHint={!dept && descReady ? pendingRecHint : undefined}
              onModify={() => setShowDeptPicker(true)}
              onOpen={() => setShowDeptPicker(true)} />
            <Hairline inset={12} />
            <FieldRow compact label="所在区域"
              value={areaType || (descReady ? '待推荐' : '请选择')}
              placeholder={!areaType}
              aiFilled={!!areaType && areaAutoDetected}
              badge={areaAutoDetected && areaType ? '自动识别' : undefined}
              onClick={() => setShowAreaPicker(true)} />
          </div>
          <Hairline inset={0} />
          <div style={REPORT_BLOCK_PAD}>

              <textarea value={desc} onChange={e => setDesc(e.target.value)} placeholder="请描述问题详情及详细地点（如：3号剧院B区第2排座椅旁）" rows={3}
                style={{ width: '100%', minHeight: 72, padding: desc.trim() ? '10px 40px 10px 12px' : '10px 12px', fontSize: 14, color: C.text, border: `1px solid ${C.line}`, borderRadius: 8, fontFamily: FONT, resize: 'none', outline: 'none', boxSizing: 'border-box', lineHeight: 1.5 }} />
              {desc.trim().length > 0 && (
                <button type="button" onClick={() => voiceToText(true)} title="语音输入"
                  style={{
                    position: 'absolute', right: 8, bottom: 8, width: 24, height: 24, borderRadius: 12,

                    display: 'flex', alignItems: 'center', justifyContent: 'center',

                  <svg width="12" height="12" viewBox="0 0 14 14" fill="none">

                  </svg>
                </button>
              )}
            </div>
            {!desc.trim() && (
              <button
                onMouseDown={() => { setVoiceRecording(true); setVoiceDuration(0); }}
                onMouseUp={() => { setVoiceRecording(false); if (voiceDuration > 0.3) voiceToText(false); }}
                onMouseLeave={() => { if (voiceRecording) setVoiceRecording(false); }}
                onTouchStart={() => { setVoiceRecording(true); setVoiceDuration(0); }}
                onTouchEnd={() => { setVoiceRecording(false); if (voiceDuration > 0.3) voiceToText(false); }}
                style={{ width: '100%', height: 40, marginTop: 8, border: 'none', borderRadius: 8, background: voiceRecording ? C.danger : C.brand, color: '#fff', fontSize: 13, fontWeight: 500, cursor: 'pointer', fontFamily: FONT, userSelect: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6 }}>

                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <rect x="5" y="1.5" width="4" height="7" rx="2" stroke="#fff" strokeWidth="1.3"/>
                    <path d="M2.5 7c0 2.5 2 4.5 4.5 4.5s4.5-2 4.5-4.5M7 11.5v1.5" stroke="#fff" strokeWidth="1.3" strokeLinecap="round"/>

          </div>

          <div style={REPORT_BLOCK_PAD}>
            <div style={{ fontSize: 13, color: C.textSec, marginBottom: 8 }}>紧急程度</div>
            <div style={{ display: 'flex', gap: 8 }}>
              {['常规', '立即处理'].map(u => (
                <button key={u} onClick={() => setUrgent(u)} style={{
                  flex: 1, height: 36, border: `1px solid ${urgent === u ? (u === '立即处理' ? C.danger : C.brand) : C.line}`,
                  borderRadius: 6, background: urgent === u ? (u === '立即处理' ? C.dangerSoft : C.brandSoft) : '#fff',
                  color: urgent === u ? (u === '立即处理' ? C.danger : C.brand) : C.textSec,
                  fontSize: 14, fontWeight: 500, cursor: 'pointer', fontFamily: FONT,

              ))}
            </div>

      </div>
      <div style={STICKY_FOOTER_STYLE}>
        <button onClick={submit} disabled={!canSubmit} style={{ ...STICKY_PRIMARY_BTN, background: canSubmit ? C.brand : C.lineStrong, color: canSubmit ? '#fff' : C.textTer, fontSize: 16, fontWeight: 600, cursor: canSubmit ? 'pointer' : 'not-allowed' }}>确认提交并派单</button>
        <div style={{ fontSize: 11, color: canSubmit ? C.brand : C.textTer, textAlign: 'center', marginTop: 8 }}>
          {getBottomHint()}
        </div>
      </div>
      {showMediaPicker && (
        <BottomSheet title="选择上传方式" onClose={() => setShowMediaPicker(false)}>
          {[{ label: '现场拍照', type: 'photo' }, { label: '相册选择图片', type: 'photo' }, { label: '现场拍视频', type: 'video' }, { label: '相册选择视频', type: 'video' }].map(({ label, type }) => (
            <div key={label} onClick={() => addMedia(type)} style={{ padding: '15px 20px', fontSize: 15, color: C.text, cursor: 'pointer', borderBottom: `0.5px solid ${C.line}` }}>{label}</div>
          ))}
        </BottomSheet>
      )}
      {showAreaPicker && (
        <BottomSheet title="选择所在区域" onClose={() => setShowAreaPicker(false)}>
          {REPORT_DATA.areas.map(a => (
            <div key={a} onClick={() => { userSetArea(a); setShowAreaPicker(false); }} style={{ padding: '14px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: `0.5px solid ${C.line}`, cursor: 'pointer', fontSize: 15, color: C.text }}>
              {a}{areaType === a && <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 4" stroke={C.brand} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
          ))}
        </BottomSheet>
      )}
      {showCatPicker && (
        <BottomSheet title="选择问题类别" onClose={() => setShowCatPicker(false)}>
          {REPORT_DATA.cats.map(c => (
            <div key={c} onClick={() => { userSetCat(c); setShowCatPicker(false); }} style={{ padding: '14px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: `0.5px solid ${C.line}`, cursor: 'pointer', fontSize: 15, color: C.text }}>
              {c}{cat === c && <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 4" stroke={C.brand} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
          ))}
        </BottomSheet>
      )}
      {showDeptPicker && (
        <BottomSheet title="确认责任部门" onClose={() => setShowDeptPicker(false)}>
          {REPORT_DATA.depts.map(d => (
            <div key={d} onClick={() => selectDept(d)} style={{ padding: '14px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: `0.5px solid ${C.line}`, cursor: 'pointer', fontSize: 15, color: C.text }}>
              {d}{dept === d && <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l3.5 3.5L12 4" stroke={C.brand} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
          ))}
        </BottomSheet>
      )}
    </div>
  );
}

function TicketsScreen({ tickets, onTicketClick, onTabChange, badges, directorMode = false, listState, onListStateChange }) {
  const user = window.DATA.currentUser || CURRENT_USER;
  const scrollRef = React.useRef(null);
  const { scopeTab, statusFilter, timeRange, q, scrollTop, deptFilter } = listState;
  const patchListState = (patch) => onListStateChange({ ...listState, ...patch });
  React.useLayoutEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollTop || 0;
  }, []);
  const handleOpenTicket = (t) => {
    const st = scrollRef.current ? scrollRef.current.scrollTop : 0;
    onListStateChange({ ...listState, scrollTop: st });
    onTicketClick(t);
  };
  const matchSearch = (t) => !q.trim() || [t.desc, t.loc, t.who, t.id, t.dept].some(s => s.includes(q.trim()));
  const matchTicket = (t, scope, status, range = timeRange) => {
    const scopeOk = scope === '我上报的' ? t.who === user.name
      : scope === '我部门的' ? t.dept === user.dept : true;
    const statusOk = status === '全部' ? true
      : status === '待处理' ? t.status === '待处理'
      : t.status === status;
    const rangeOk = isTicketInTimeRange(t, range);
    const timeOk = isTicketInListScope(t, status);
    const deptOk = !deptFilter || t.dept === deptFilter;
    return scopeOk && statusOk && rangeOk && timeOk && deptOk;
  };
  const filterList = (scope, status, range = timeRange) => tickets.filter(t => matchTicket(t, scope, status, range) && matchSearch(t));
  const list = sortTicketsForList(filterList(scopeTab, statusFilter), statusFilter);
  const scopeTabs = directorMode ? ['全部工单'] : ['我上报的', '我部门的', '全部工单'];
  const statusFilters = ['全部', '待处理', '已整改', '不整改'];
  const summaryTotal = tickets.filter(t => matchTicket(t, '全部工单', statusFilter, timeRange)).length;
  const summaryDept = tickets.filter(t => matchTicket(t, '我部门的', statusFilter, timeRange)).length;

          </span>
        </div>
        <div style={{ display: 'flex', width: '100%', marginBottom: 12 }}>
          {scopeTabs.map(g => (
            <button key={g} onClick={() => patchListState({ scopeTab: g, scrollTop: 0 })} style={{
              flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
              padding: '8px 4px', background: 'none', border: 'none', cursor: 'pointer',
              borderBottom: scopeTab === g ? `2px solid ${C.brand}` : '2px solid transparent',
              color: scopeTab === g ? C.brand : C.textSec, fontSize: 14, fontWeight: scopeTab === g ? 600 : 400, fontFamily: FONT,
              textAlign: 'center', whiteSpace: 'nowrap',
            }}>{g} <span style={{ fontWeight: 400, fontSize: 12 }}>({filterList(g, statusFilter).length})</span></button>
          ))}
        </div>
        <div style={{ display: 'flex', width: '100%', marginBottom: 10, gap: 6 }}>
          {statusFilters.map(s => (
            <button key={s} onClick={() => patchListState({ statusFilter: s, scrollTop: 0 })} style={{
              flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
              padding: '6px 4px', borderRadius: 14, border: 'none', cursor: 'pointer', fontFamily: FONT, fontSize: 12,
              background: statusFilter === s ? C.brandSoft : C.surfaceAlt,
              color: statusFilter === s ? C.brand : C.textSec,
              fontWeight: statusFilter === s ? 600 : 400, textAlign: 'center',
            }}>{s}</button>
          ))}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '0 0 10px' }}>
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8, height: 32, padding: '0 10px', background: C.surfaceAlt, borderRadius: 6 }}>

            <input value={q} onChange={e => patchListState({ q: e.target.value, scrollTop: 0 })} placeholder="搜索工单描述、区域、发现人…"
              style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 13, fontFamily: FONT, color: C.text }} />

function VoiceInputBar({ value, onChange, placeholder }) {
  const [recording, setRecording] = React.useState(false);
  const [duration, setDuration] = React.useState(0);
  React.useEffect(() => {
    let timer;
    if (recording) timer = setInterval(() => setDuration(d => d + 0.1), 100);
    return () => clearInterval(timer);
  }, [recording]);
  const stopRecord = () => {
    setRecording(false);
    if (duration > 0.3) onChange((value || '') + (value ? ' ' : '') + '整改已完成，现场情况见照片。');
    setDuration(0);
  };
  return (
    <div style={{ position: 'relative' }}>
      <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder || '选填，可描述整改措施'} rows={3}

      <button type="button"
        onMouseDown={(e) => { e.preventDefault(); setRecording(true); setDuration(0); }}
        onMouseUp={stopRecord}
        onMouseLeave={() => { if (recording) stopRecord(); }}
        onTouchStart={(e) => { e.preventDefault(); setRecording(true); setDuration(0); }}
        onTouchEnd={stopRecord}
        title="按住说话"
        style={{
          position: 'absolute', right: 8, bottom: 8, width: 28, height: 28, borderRadius: 14,
          border: recording ? 'none' : `1px solid ${C.line}`, background: recording ? C.danger : '#fff',
          color: recording ? '#fff' : C.textSec, fontSize: 13, cursor: 'pointer', fontFamily: FONT,
          display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 0, lineHeight: 1,

      </button>
    </div>
  );
}

  const actionSheetStyles = {

    panel: { width: '100%', maxHeight: '65%', background: '#FFFFFF', borderTopLeftRadius: 16, borderTopRightRadius: 16, display: 'flex', flexDirection: 'column' },
    handle: { width: 36, height: 4, borderRadius: 2, background: '#E0E0E0', margin: '12px auto 0' },
    titleRow: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 16px 12px' },
    titleText: { fontSize: 16, fontWeight: 600, color: C.text },
    cancelBtn: { background: 'none', border: 'none', fontSize: 14, color: C.textSec, cursor: 'pointer', fontFamily: FONT },
    divider: { height: 0.5, background: '#EEEEEE' },
    body: { flex: 1, overflowY: 'auto', padding: '16px' },
  };
  if (doneMsg) {
    return (
      <div style={{ flex: 1, background: C.surface, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 28, textAlign: 'center' }}>
        <div style={{ width: 72, height: 72, borderRadius: 36, background: C.successSoft, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20 }}>
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M8 18l7 7 13-13" stroke={C.success} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{ fontSize: 18, fontWeight: 600, color: C.text, marginBottom: 8 }}>{doneMsg.title}</div>
        <div style={{ fontSize: 14, color: C.textSec, lineHeight: 1.7, marginBottom: 24 }}>{doneMsg.sub}</div>
        <button type="button" onClick={onBack} style={{ height: 44, padding: '0 32px', border: 'none', borderRadius: 8, background: C.brand, color: '#fff', fontSize: 15, fontWeight: 600, cursor: 'pointer', fontFamily: FONT }}>返回</button>
      </div>
    );
  }
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.bg, overflow: 'hidden', position: 'relative' }}>
      <TopBar title="工单详情" onBack={onBack} />
      <div ref={scrollRef} style={{ flex: 1, overflow: 'auto', paddingBottom: canOperate ? SCROLL_PAD_STICKY_FOOTER : 16 }}>
        <div style={{ background: C.surface, padding: '16px 16px 14px' }}>
          <div style={{ fontSize: 17, fontWeight: 600, color: C.text, lineHeight: 1.4, marginBottom: 8 }}>{ticket.desc}</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
            <Tag label={ticket.status} />
            {ticket.urgent === '立即处理' ? <UrgentImmediateTag /> : null}
            <span style={{ fontSize: 11, color: C.textTer, fontFamily: MONO, marginLeft: 'auto' }}>{ticket.id}</span>

            <>
              <Hairline inset={16} />
              <DetailRow k="已产生" v={<ElapsedDaysDetailValue days={elapsedDays} status={ticket.status} />} />

          )}
          {isRectified && (
            <>
              <Hairline inset={16} />
              <DetailRow k="用时" v={<span style={{ color: C.textTer }}>{resolveDays}天</span>} />
            </>
          )}

          <DetailRow k="责任部门" v={ticket.dept} action={canOperate ? '改派' : undefined} onActionClick={canOperate ? openReassign : undefined} />

          <DetailRow k="问题类别" v={ticket.cat} />
          <Hairline inset={16} />
          <DetailRow k="所在区域" v={ticket.loc} />
          {ticket.status === '待处理' && (
            <>
              <Hairline inset={16} />
              <div style={{ display: 'flex', alignItems: 'center', minHeight: 48, padding: '0 16px' }}>
                <div style={{ width: 76, fontSize: 13, color: C.textSec, flexShrink: 0 }}>
                  预计完成时间{ticket.needExpectedDate && !expectedLocked ? <span style={{ color: C.danger }}> *</span> : null}
                </div>
                <div style={{ flex: 1, fontSize: 14, color: C.text }}>
                  {expectedLocked ? (
                    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                      <span>{formatExpectedDate(expectedDate)}</span>
                      {!expectedEditUsed && (
                        <button type="button" onClick={openExpectedPicker} style={{ fontSize: 12, color: C.brand, background: 'none', border: `1px solid ${C.brand}`, borderRadius: 4, padding: '3px 8px', cursor: 'pointer', fontFamily: FONT }}>修改</button>
                      )}
                    </span>
                  ) : ticket.needExpectedDate ? (
                    <button type="button" onClick={openExpectedPicker} style={{ background: 'none', border: 'none', padding: 0, color: C.danger, fontSize: 14, cursor: 'pointer', fontFamily: FONT, textAlign: 'left' }}>

                    </button>
                  )}
                </div>
              </div>
              {expectedLocked && expectedNote.trim() && (
                <>
                  <Hairline inset={16} />
                  <DetailRow k="补充说明" v={expectedNote} />
                </>
              )}
            </>
          )}
        </div>
        {isRectified && (
          <div style={{ background: C.surface, marginTop: 8, marginBottom: 16 }}>
            <div style={{ padding: '14px 16px' }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 12 }}>整改结果</div>

              )}
            </div>
            {ticket.doneTime && (
              <>

          )}

            ...STICKY_PRIMARY_BTN,
            background: fixPanelOpen ? (canSubmitFix ? C.brand : C.lineStrong) : C.brand,
            color: fixPanelOpen ? (canSubmitFix ? '#fff' : C.textTer) : '#fff',

            cursor: fixPanelOpen ? (canSubmitFix ? 'pointer' : 'not-allowed') : 'pointer',

            width: '100%', marginTop: 8, padding: '4px 0', background: 'none', border: 'none',
            fontSize: 12, color: C.textTer, cursor: 'pointer', fontFamily: FONT, textAlign: 'center',
          }}>该问题无需整改？申请不整改</button>
        </div>
      )}
      {canOperate && actionPanel === 'no-fix' && (
        <div style={actionSheetStyles.mask} onClick={() => togglePanel('no-fix')}>
          <div style={actionSheetStyles.panel} onClick={e => e.stopPropagation()}>
            <div style={actionSheetStyles.handle} />
            <div style={actionSheetStyles.titleRow}>
              <div style={actionSheetStyles.titleText}>申请不整改</div>
              <button type="button" onClick={() => togglePanel('no-fix')} style={actionSheetStyles.cancelBtn}>取消</button>
            </div>
            <div style={actionSheetStyles.divider} />
            <div style={actionSheetStyles.body}>
              <textarea value={noFixReason} onChange={e => setNoFixReason(e.target.value)} placeholder="请填写不整改原因" rows={4}

              <button type="button" disabled={!canSubmitNoFix} onClick={() => setDoneMsg({ title: '已提交审核', sub: '等待景区负责人（朱丽锋）审批' })} style={{ width: '100%', height: 44, marginTop: 14, marginBottom: 20, border: 'none', borderRadius: 8, background: canSubmitNoFix ? C.brand : C.lineStrong, color: canSubmitNoFix ? '#fff' : C.textTer, fontSize: 15, fontWeight: 600, cursor: canSubmitNoFix ? 'pointer' : 'not-allowed', fontFamily: FONT }}>提交审核</button>
              <div style={{ fontSize: 11, color: C.textTer, textAlign: 'center', lineHeight: 1.5 }}>提交后将发送至景区负责人（朱丽锋）审核</div>
            </div>
          </div>
        </div>
      )}
      {showReassign && (
        <ReassignModal currentDept={ticket.dept} dept={reassignDept} onDeptChange={setReassignDept} reason={reassignReason} onReasonChange={setReassignReason}
          onCancel={() => setShowReassign(false)} onConfirm={() => { if (!canReassign) return; setShowReassign(false); setDoneMsg({ title: '改派成功', sub: `工单已改派至 ${reassignDept}` }); }} canConfirm={canReassign} />
      )}
      {ticket.status === '待处理' && showExpectedPicker && (
        <div style={actionSheetStyles.mask} onClick={() => setShowExpectedPicker(false)}>
          <div style={actionSheetStyles.panel} onClick={e => e.stopPropagation()}>
            <div style={actionSheetStyles.handle} />
            <div style={actionSheetStyles.titleRow}>
              <div style={actionSheetStyles.titleText}>{expectedLocked ? '修改预计完成时间' : (ticket.needExpectedDate ? '填写预计整改时间' : '填写预计完成时间')}</div>
              <button type="button" onClick={() => setShowExpectedPicker(false)} style={actionSheetStyles.cancelBtn}>取消</button>
            </div>
            <div style={actionSheetStyles.divider} />
            <div style={actionSheetStyles.body}>
              <div style={{ fontSize: 12, color: C.textSec, marginBottom: 8 }}>预计完成日期{ticket.needExpectedDate ? <span style={{ color: C.danger }}> *</span> : null}</div>
              <input type="date" value={pickerDate} onChange={e => setPickerDate(e.target.value)}
                style={{ width: '100%', height: 44, padding: '0 12px', fontSize: 14, color: C.text, border: `1px solid ${C.line}`, borderRadius: 8, background: C.surfaceAlt, fontFamily: FONT, outline: 'none', marginBottom: 14, boxSizing: 'border-box' }} />
              <div style={{ fontSize: 12, color: C.textSec, marginBottom: 8 }}>补充说明（选填）</div>
              <textarea value={pickerNote} onChange={e => setPickerNote(e.target.value)} placeholder="可补充整改计划、注意事项等…" rows={3}
                style={{ width: '100%', minHeight: 72, padding: '10px 12px', fontSize: 14, color: C.text, border: `1px solid ${C.line}`, borderRadius: 8, fontFamily: FONT, resize: 'none', outline: 'none', boxSizing: 'border-box', lineHeight: 1.5, marginBottom: 4 }} />
              {expectedLocked && !expectedEditUsed && (
                <div style={{ fontSize: 11, color: C.textTer, marginBottom: 8 }}>保存后将不可再次修改</div>
              )}
              <button type="button" disabled={!pickerDate} onClick={saveExpectedFromPicker} style={{ width: '100%', height: 44, marginTop: 10, marginBottom: 20, border: 'none', borderRadius: 8, background: pickerDate ? C.brand : C.lineStrong, color: pickerDate ? '#fff' : C.textTer, fontSize: 15, fontWeight: 600, cursor: pickerDate ? 'pointer' : 'not-allowed', fontFamily: FONT }}>保存</button>
            </div>
          </div>
        </div>
      )}
      {previewPhoto && <PhotoLightbox onClose={() => setPreviewPhoto(null)} />}
    </div>
  );
}

function RankRow({ rank, name, count, maxCount, isLast, compact }) {
  const isTop = rank <= 3;
  const pct = maxCount > 0 ? Math.round((count / maxCount) * 100) : 0;
  const barFill = isTop ? C.brand : '#D5DBE5';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 8, padding: compact ? '8px 0' : '12px 0',
      borderBottom: isLast ? 'none' : `0.5px solid ${C.line}`,
    }}>
      <span style={{
        width: 20, textAlign: 'center', fontSize: 12, fontWeight: isTop ? 600 : 400,
        color: isTop ? C.brand : C.textTer, fontFamily: MONO, flexShrink: 0,
      }}>{rank.toString().padStart(2, '0')}</span>
      <span style={{ flexShrink: 0, maxWidth: '42%', fontSize: 14, color: C.text, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{name}</span>
      <div style={{ flex: 1, minWidth: 24, height: 3, borderRadius: 1.5, background: '#F0F2F5', overflow: 'hidden' }}>
        <div style={{ width: `${pct}%`, height: '100%', borderRadius: 1.5, background: barFill }} />
      </div>
      <span style={{ fontSize: 14, fontWeight: 600, color: C.text, fontFamily: MONO, flexShrink: 0, width: 24, textAlign: 'right' }}>{count}</span>
    </div>
  );
}

function RankCard({ title, items, expanded, onToggleExpand, subtitle }) {
  const visible = expanded ? items : items.slice(0, RANK_PREVIEW_COUNT);
  const maxCount = items[0]?.count || 1;
  const compact = !expanded;
  return (
    <div style={{ margin: `${DASH_MODULE_GAP}px 16px 0`, background: C.surface, padding: '0 16px 8px' }}>
      <div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: subtitle ? 4 : DASH_TITLE_GAP }}>{title}</div>
      {subtitle && (
        <div style={{ fontSize: 11, color: C.textTer, marginBottom: DASH_TITLE_GAP }}>{subtitle}</div>
      )}
      {visible.map((it, i) => (
        <RankRow key={it.name} rank={i + 1} name={it.name} count={it.count} maxCount={maxCount}
          compact={compact}
          isLast={i === visible.length - 1 && (expanded || items.length <= RANK_PREVIEW_COUNT)} />
      ))}
      {items.length > RANK_PREVIEW_COUNT && (
        <button type="button" onClick={onToggleExpand} style={{
          width: '100%', minHeight: compact ? 36 : 44, padding: compact ? '6px 0 2px' : '10px 0 4px', marginTop: compact ? 2 : 4, background: 'none', border: 'none',
          color: C.brand, fontSize: 13, cursor: 'pointer', fontFamily: FONT,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>{expanded ? '收起' : `展开全部（共${items.length}个）`}</button>
      )}
    </div>
  );
}

function DeptStatCard({ rank, name, count, done, pending, noFix, onRowClick, onTagClick }) {
  const [rowPressed, setRowPressed] = React.useState(false);
  const [tagPressed, setTagPressed] = React.useState(null);
  const isTop = rank <= 3;
  const badges = [
    { label: '已处理', count: done, color: RANK_COLORS.done, status: '已整改', clickable: false },
    { label: '待处理', count: pending, color: RANK_COLORS.pending, status: '待处理', clickable: true },
    { label: '不整改', count: noFix, color: RANK_COLORS.noFix, status: '不整改', clickable: true },
  ];
  const setRowPress = (v) => () => setRowPressed(v);
  const setTagPress = (label) => () => setTagPressed(label);
  return (
    <div style={{
      background: DASH_CARD_BG,
      borderRadius: 8,
      padding: '12px 16px',
      boxSizing: 'border-box',
    }}>
      <div
        role="button"
        tabIndex={0}
        onClick={() => onRowClick && onRowClick(name)}
        onTouchStart={setRowPress(true)}
        onTouchEnd={setRowPress(false)}
        onTouchCancel={setRowPress(false)}
        onMouseDown={setRowPress(true)}
        onMouseUp={setRowPress(false)}
        onMouseLeave={setRowPress(false)}
        style={{
          display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10,
          cursor: 'pointer',
          transform: rowPressed ? 'scale(0.98)' : 'scale(1)',
          transition: 'transform 0.1s ease',
        }}
      >
        <span style={{
          width: 20, textAlign: 'center', fontSize: 12, fontWeight: isTop ? 600 : 400,
          color: isTop ? C.brand : C.textTer, fontFamily: MONO, flexShrink: 0,
        }}>{rank.toString().padStart(2, '0')}</span>
        <span style={{
          flex: 1, minWidth: 0, fontSize: 14, fontWeight: 500, color: C.text,
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
        }}>{name}</span>
        <span style={{ fontSize: 16, fontWeight: 600, color: C.text, fontFamily: MONO, flexShrink: 0 }}>{count}</span>
        <span style={{ color: C.textTer, fontSize: 16, lineHeight: 1, flexShrink: 0 }}>{'>'}</span>
      </div>
      <div style={{ display: 'flex', gap: 6 }}>
        {badges.map(b => {
          const canClick = b.clickable && b.count > 0 && onTagClick;
          const filled = canClick && tagPressed === b.label;
          return (
          <span
            key={b.label}
            role={canClick ? 'button' : undefined}
            tabIndex={canClick ? 0 : undefined}
            onClick={canClick ? (e) => {
              e.stopPropagation();
              onTagClick(name, b.status);
            } : undefined}
            onTouchStart={canClick ? setTagPress(b.label) : undefined}
            onTouchEnd={canClick ? setTagPress(null) : undefined}
            onTouchCancel={canClick ? setTagPress(null) : undefined}
            onMouseDown={canClick ? setTagPress(b.label) : undefined}
            onMouseUp={canClick ? setTagPress(null) : undefined}
            onMouseLeave={canClick ? setTagPress(null) : undefined}
            style={{
              flex: 1, minWidth: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
              padding: '5px 4px', borderRadius: 4,
              background: filled ? b.color : '#fff',
              color: filled ? '#fff' : b.color,
              border: `1px solid ${b.color}`,
              fontSize: 11, fontWeight: 500, whiteSpace: 'nowrap',
              cursor: canClick ? 'pointer' : 'default',
              transform: filled ? 'scale(0.96)' : 'scale(1)',
              transition: 'transform 0.12s ease, background 0.12s ease, color 0.12s ease',
            }}
          >{b.label} {b.count}</span>
          );
        })}
      </div>
    </div>
  );

function efficiencyTagStyle(avgDays) {
  if (avgDays <= 2) return { bg: '#F0FBF4', color: C.success };
  if (avgDays <= 3.5) return { bg: '#FFF7E8', color: C.warn };
  return { bg: '#FEF2F1', color: C.danger };
}

function MyTicketsScreen({ tickets, onBack, onTicketClick, listState, onListStateChange }) {
  const user = window.DATA.currentUser || CURRENT_USER;
  const scrollRef = React.useRef(null);
  const { scopeTab, statusFilter, timeRange, q, scrollTop } = listState;
  const patchListState = (patch) => onListStateChange({ ...listState, ...patch });
  React.useLayoutEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollTop || 0;
  }, []);
  const handleOpenTicket = (t) => {
    const st = scrollRef.current ? scrollRef.current.scrollTop : 0;
    onListStateChange({ ...listState, scrollTop: st });
    onTicketClick(t);
  };
  const scopeTabs = ['我上报的', '待我处理'];
  const statusFilters = ['全部', '待处理', '已整改', '不整改'];
  const matchSearch = (t) => !q.trim() || [t.desc, t.loc, t.who, t.id, t.dept].some(s => String(s).includes(q.trim()));
  const filterList = (scope, status, range = timeRange) => tickets.filter(t => {
    const scopeOk = scope === '我上报的' ? t.who === user.name : t.dept === user.dept && t.status === '待处理';
    const statusOk = status === '全部' ? true : status === '待处理' ? t.status === '待处理' : t.status === status;
    const rangeOk = isTicketInTimeRange(t, range);
    return scopeOk && statusOk && rangeOk && matchSearch(t);
  });
  const list = filterList(scopeTab, statusFilter).sort((a, b) => (b.overdueDays || 0) - (a.overdueDays || 0));
  const tabStyle = (active) => ({
    flex: 1, textAlign: 'center', padding: '10px 0', fontSize: 14, fontWeight: active ? 600 : 400,
    color: active ? C.brand : C.textSec, cursor: 'pointer', borderBottom: active ? `2px solid ${C.brand}` : '2px solid transparent', fontFamily: FONT,
  });
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.bg, overflow: 'hidden' }}>
      <TopBar title="我的工单" onBack={onBack} />
      <div style={{ background: C.surface, borderBottom: `0.5px solid ${C.line}`, flexShrink: 0 }}>
        <div style={{ display: 'flex' }}>{scopeTabs.map(g => <div key={g} style={tabStyle(scopeTab === g)} onClick={() => patchListState({ scopeTab: g, scrollTop: 0 })}>{g} ({filterList(g, statusFilter).length})</div>)}</div>
        <div style={{ display: 'flex', gap: 6, padding: '10px 16px 10px' }}>
          {statusFilters.map(s => (
          <button key={s} onClick={() => patchListState({ statusFilter: s, scrollTop: 0 })} style={{ flex: 1, padding: '6px 4px', borderRadius: 14, border: 'none', cursor: 'pointer', fontFamily: FONT, fontSize: 12, background: statusFilter === s ? C.brandSoft : C.surfaceAlt, color: statusFilter === s ? C.brand : C.textSec, fontWeight: statusFilter === s ? 600 : 400 }}>{s}</button>
        ))}</div>
        <div style={{ padding: '0 16px 12px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8, height: 32, padding: '0 10px', background: C.surfaceAlt, borderRadius: 6 }}>
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke={C.textTer} strokeWidth="1.4"/><path d="M11 11l3 3" stroke={C.textTer} strokeWidth="1.4" strokeLinecap="round"/></svg>
              <input value={q} onChange={e => patchListState({ q: e.target.value, scrollTop: 0 })} placeholder="搜索工单描述、区域…" style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 13, fontFamily: FONT, color: C.text }} />
            </div>
            <TimeRangeSelect value={timeRange} onChange={v => patchListState({ timeRange: v, scrollTop: 0 })} />
          </div>
        </div>
      </div>
      <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto', background: C.surface }}>
        {list.map((t, i) => <MyTicketRow key={t.id} t={t} onClick={() => handleOpenTicket(t)} isLast={i === list.length - 1} />)}
        {list.length === 0 && <div style={{ padding: 60, textAlign: 'center', color: C.textTer, fontSize: 13 }}>暂无工单</div>}
      </div>
    </div>
  );
}

function NotificationsScreen({ items, onBack, onOpenTicket, onMarkRead, onDelete, listState, onListStateChange }) {
  const scrollRef = React.useRef(null);
  const { filter, expandedId, scrollTop } = listState;
  const patchState = (patch) => onListStateChange({ ...listState, ...patch });
  React.useLayoutEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollTop || 0;
  }, []);
  const filters = ['全部', '滞留提醒', '系统'];
  const recentItems = items.filter(isNotificationInRecentMonth);
  const filtered = recentItems.filter(n => filter === '全部' ? true : filter === '滞留提醒' ? n.type === 'detained' : n.type === 'system');
  const grouped = ['今天', '昨天', '更早'].map(g => ({ label: g, items: filtered.filter(n => n.group === g) })).filter(g => g.items.length > 0);
  const handleClick = (n) => {
    onMarkRead(n.id);
    if (n.type === 'detained' && n.ticketId) {
      const st = scrollRef.current ? scrollRef.current.scrollTop : 0;
      onListStateChange({ ...listState, scrollTop: st });
      onOpenTicket(n.ticketId);
      return;
    }
    if (n.type === 'system' && n.ticketId) {
      const st = scrollRef.current ? scrollRef.current.scrollTop : 0;
      onListStateChange({ ...listState, scrollTop: st });
      onOpenTicket(n.ticketId);
      return;
    }
    if (n.type === 'system' && n.detail) patchState({ expandedId: expandedId === n.id ? null : n.id });
  };
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.bg, overflow: 'hidden' }}>
      <TopBar title="消息通知" onBack={onBack} />
      <div style={{ display: 'flex', gap: 6, padding: '10px 16px', background: C.surface, borderBottom: `0.5px solid ${C.line}`, flexShrink: 0, overflowX: 'auto' }}>
        {filters.map(f => <button key={f} onClick={() => patchState({ filter: f, scrollTop: 0 })} style={{ flexShrink: 0, padding: '6px 12px', borderRadius: 14, border: 'none', cursor: 'pointer', fontFamily: FONT, fontSize: 12, background: filter === f ? C.brandSoft : C.surfaceAlt, color: filter === f ? C.brand : C.textSec, fontWeight: filter === f ? 600 : 400 }}>{f}</button>)}
      </div>
      <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto' }}>
        {grouped.length === 0 && (
          <div style={{ padding: 60, textAlign: 'center', color: C.textTer, fontSize: 13 }}>近1个月暂无通知</div>
        )}
        {grouped.map(g => (
          <div key={g.label}>
            <div style={{ padding: '8px 16px', fontSize: 12, color: C.textTer, background: C.surfaceAlt }}>{g.label}</div>
            <div style={{ background: C.surface }}>
              {g.items.map((n, i) => (
                <SwipeableNotificationRow
                  key={n.id}
                  isLast={i === g.items.length - 1 && expandedId !== n.id}
                  onDelete={() => onDelete && onDelete(n.id)}
                  onClick={() => handleClick(n)}
                >
                  <div style={{ minHeight: 64, padding: 16, display: 'flex', flexDirection: 'column', gap: 0 }}>
                    <div style={{ display: 'flex', gap: 10, width: '100%' }}>
                      <div style={{ width: 6, height: 6, borderRadius: 3, marginTop: 6, flexShrink: 0, background: n.unread ? C.brand : 'transparent' }} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8 }}>
                          <div style={{ fontSize: 14, fontWeight: 400, color: C.text, lineHeight: 1.45, flex: 1 }}>{n.title}</div>
                          <span style={{ fontSize: 12, color: C.textTer, flexShrink: 0 }}>{n.time}</span>
                        </div>
                        <div style={{ fontSize: 13, color: n.detained ? C.danger : C.textSec, marginTop: 4, lineHeight: 1.45 }}>{n.sub}</div>
                      </div>
                    </div>
                    {expandedId === n.id && n.detail && <div style={{ paddingLeft: 16, marginTop: 8, fontSize: 13, color: C.textSec, lineHeight: 1.55 }}>{n.detail}</div>}
                  </div>
                </SwipeableNotificationRow>
              ))}
            </div>
          </div>
        ))}
        <div style={{ padding: 24, textAlign: 'center', fontSize: 12, color: C.textTer }}>仅显示近1个月的通知</div>
      </div>
    </div>
  );
}

function CalendarScreen({ onBack }) {
  const user = (window.DATA.currentUser || CURRENT_USER).name;
  const month = '2026年4月';
  const today = 29;
  const roster = ['李宛婷', '周莉', '杨诚', '方力', '张明', '景文峰', '苏桢'];
  const calToday = '#2563EB';
  const calMineBg = '#EFF6FF';
  const calGrid = '#F3F4F6';
  const calServiceGreen = C.success;
  const calCellH = 62;
  const WEEK_LABELS = ['一', '二', '三', '四', '五', '六', '日'];

  const weekdayIdx = (d) => (d + 1) % 7;
  const weekLabel = (d) => '周' + WEEK_LABELS[weekdayIdx(d)];

  const days = [];
  for (let d = 1; d <= 30; d++) {
    let qaManager = roster[(d * 2 + Math.floor(d / 5)) % roster.length];
    let serviceManager = roster[(d * 3 + 1) % roster.length];
    if (d === today) qaManager = user;
    if (d === 14) serviceManager = user;
    if (d % 7 === 0) serviceManager = qaManager;
    days.push({ d, qaManager, serviceManager, isToday: d === today, isFuture: d > today });
  }

  const [selectedDay, setSelectedDay] = React.useState(today);
  const selected = days.find(d => d.d === selectedDay) || days.find(d => d.isToday);

  const isMyDuty = (day) => !day.isFuture && (day.qaManager === user || day.serviceManager === user);
  const myDutyDays = days.filter(isMyDuty).length;

  const getDayStyle = (day) => {
    const mine = isMyDuty(day);
    if (mine) {
      return { bg: calMineBg, dateColor: calToday, dateWeight: 700 };
    }
    return { bg: '#fff', dateColor: day.isFuture ? '#9CA3AF' : '#374151', dateWeight: 500 };
  };

  // 4 字以上姓名会截断,符合预期(绝大多数为三字以内)
  const renderDayNames = (day) => {
    const qa = day.qaManager;
    const svc = day.serviceManager;
    if (qa && svc && qa === svc) {
      return (
        <div style={{ marginTop: 2, width: '100%' }}>
          <div style={{
            fontSize: 11, lineHeight: 1.3, textAlign: 'left', color: calToday,
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>{qa}</div>
          <div style={{ fontSize: 10, lineHeight: 1.2, color: C.textTer, marginTop: 1 }}>质/服</div>
        </div>
      );
    }
    return (
      <div style={{ marginTop: 2, width: '100%' }}>
        {qa && (
          <div style={{
            fontSize: 11, lineHeight: 1.3, textAlign: 'left', color: calToday,
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>{qa}</div>
        )}
        {svc && (
          <div style={{
            fontSize: 11, lineHeight: 1.3, textAlign: 'left', color: calServiceGreen,
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', marginTop: qa ? 2 : 0,
          }}>{svc}</div>
        )}
      </div>
    );
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.bg, overflow: 'hidden' }}>
      <TopBar title="巡检日历" onBack={onBack} />
      <div style={{ flex: 1, overflow: 'auto' }}>
        <div style={{ background: C.surface, padding: '18px 16px 14px' }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 28, fontWeight: 600, color: C.text, fontFamily: MONO, lineHeight: 1, marginBottom: 6 }}>{myDutyDays}</div>
            <div style={{ fontSize: 12, color: C.textTer }}>出勤天数</div>
          </div>
        </div>
        <div style={{ background: C.surface, marginTop: 8, padding: '14px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: `0.5px solid ${C.line}` }}>
          <button style={{ background: 'none', border: 'none', padding: 4, cursor: 'pointer' }}>
            <svg width="8" height="14" viewBox="0 0 8 14"><path d="M7 1L1 7l6 6" stroke={C.text} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          <div style={{ fontSize: 15, fontWeight: 600, color: C.text }}>{month}</div>
          <button style={{ background: 'none', border: 'none', padding: 4, cursor: 'pointer' }}>
            <svg width="8" height="14" viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" stroke={C.text} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
        </div>
        <div style={{ background: C.surface, padding: '10px 12px 18px' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 20, marginBottom: 10 }}>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 11, color: C.textTer }}>
              <span style={{ width: 6, height: 6, borderRadius: 3, background: calToday, flexShrink: 0 }} />
              质检经理
            </span>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 11, color: C.textTer }}>
              <span style={{ width: 6, height: 6, borderRadius: 3, background: calServiceGreen, flexShrink: 0 }} />
              服务经理
            </span>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', marginBottom: 6 }}>
            {WEEK_LABELS.map(w => (
              <div key={w} style={{ textAlign: 'center', fontSize: 11, color: C.textTer, padding: '4px 0' }}>{w}</div>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 1, background: calGrid }}>
            {[null, null].map((_, i) => (
              <div key={`e${i}`} style={{ minHeight: calCellH, background: '#fff' }} />
            ))}
            {days.map(day => {
              const s = getDayStyle(day);
              const isSelected = selectedDay === day.d;
              return (
                <div
                  key={day.d}
                  role="button"
                  tabIndex={0}
                  onClick={() => setSelectedDay(day.d)}
                  style={{
                    minHeight: calCellH, display: 'flex', flexDirection: 'column', alignItems: 'stretch',
                    padding: '4px 3px', background: s.bg, cursor: 'pointer',
                    boxShadow: isSelected ? `inset 0 0 0 1.5px ${calToday}` : 'none',
                  }}
                >
                  <div style={{
                    fontSize: 12, fontWeight: s.dateWeight, fontFamily: MONO, lineHeight: 1,
                    color: s.dateColor, alignSelf: 'flex-start',
                  }}>{day.d}</div>
                  {renderDayNames(day)}
                </div>
              );
            })}
          </div>
        </div>
        {selected && (
          <div style={{ background: C.surface, marginTop: 8, padding: '14px 16px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>
                4月{selected.d}日 · {weekLabel(selected.d)}
              </span>
              {selected.isToday && (
                <span style={{
                  fontSize: 10, fontWeight: 500, color: calToday, background: calMineBg,
                  padding: '2px 6px', borderRadius: 4,
                }}>今日</span>
              )}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: C.text, lineHeight: 1.6 }}>
              <span style={{ width: 6, height: 6, borderRadius: 3, background: calToday, flexShrink: 0 }} />
              <span style={{ color: C.textTer, flexShrink: 0 }}>质检经理</span>
              <span>{selected.qaManager}</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: C.text, lineHeight: 1.6, marginTop: 6 }}>
              <span style={{ width: 6, height: 6, borderRadius: 3, background: calServiceGreen, flexShrink: 0 }} />
              <span style={{ color: C.textTer, flexShrink: 0 }}>服务经理</span>
              <span>{selected.serviceManager}</span>
            </div>
          </div>
        )}
        <div style={{ height: 20 }} />
      </div>
    </div>
  );
}

function App() {
  // route: 'home' | 'tickets' | 'dashboard' | 'me' | 'my-tickets' | 'notifications' | 'examples' | 'report' | 'ticket-detail' | 'calendar'
  const [route, setRoute] = React.useState('home');
  const [activeTicket, setActiveTicket] = React.useState(null);
  const [tickets] = React.useState(TICKETS);
  const [taskStates, setTaskStates] = React.useState(() => SECTIONS.map(s => Array(s.items.length).fill(null)));
  const [reportSource, setReportSource] = React.useState(null);
  const [ticketDetailFrom, setTicketDetailFrom] = React.useState(null);
  const [notifications, setNotifications] = React.useState(NOTIFICATIONS);
  const [ticketsListState, setTicketsListState] = React.useState(() => createTicketsListState('我部门的'));
  const [myTicketsListState, setMyTicketsListState] = React.useState(() => createMyTicketsListState());
  const [dashboardState, setDashboardState] = React.useState(() => createDashboardState());
  const [notificationsListState, setNotificationsListState] = React.useState(() => createNotificationsListState());

  const unreadNotifyCount = notifications.filter(n => n.unread).length;
  const badges = { tickets: 7, me: unreadNotifyCount };

  const markNotificationRead = (id) => {
    setNotifications(prev => prev.map(n => n.id === id ? { ...n, unread: false } : n));
  };
  const deleteNotification = (id) => {
    setNotifications(prev => prev.filter(n => n.id !== id));
  };

  const openTicketFromRoute = (t, fromRoute) => {
    setActiveTicket(t);
    setTicketDetailFrom(fromRoute);
    setRoute('ticket-detail');
  };

  const openTicketById = (ticketId) => {
    const t = TICKETS.find(x => x.id === ticketId);
    if (t) openTicketFromRoute(t, route);
  };

  const handleTabChange = (tab) => {
    if (tab === 'tickets') setTicketsListState(createTicketsListState('我部门的'));
    if (tab === 'dashboard') setDashboardState(createDashboardState());
    setRoute(tab);
  };

  const openReport = (source) => {
    setReportSource(source || null);
    setRoute('report');
  };

  const closeReport = () => {
    setReportSource(null);
    setRoute('home');
  };

  const handleReportSubmit = () => {
    if (reportSource && reportSource.sIdx != null) {
      const { sIdx, iIdx } = reportSource;
      setTaskStates(prev => {
        const next = prev.map(s => [...s]);
        next[sIdx][iIdx] = 'issue';
        return next;
      });
    }
    setReportSource(null);
    setRoute('home');
  };

  let screen;
  if (route === 'home') {
    screen = <TodayTasksScreen onTabChange={handleTabChange}
      onOpenReport={openReport} badges={badges} states={taskStates} setStates={setTaskStates} />;
  } else if (route === 'tickets') {
    screen = <TicketsScreen tickets={tickets}
      listState={ticketsListState}
      onListStateChange={setTicketsListState}
      onTicketClick={(t) => openTicketFromRoute(t, 'tickets')}
      onTabChange={handleTabChange} badges={badges} />;
  } else if (route === 'dashboard') {
    screen = <DashboardScreen
      onTabChange={handleTabChange}
      badges={badges}
      listState={dashboardState}
      onListStateChange={setDashboardState}
      onTicketClick={(t) => openTicketFromRoute(t, 'dashboard')}
      onDrillToTickets={(payload) => {
        setTicketsListState(createTicketsListState(payload.scopeTab || '全部工单', {
          statusFilter: payload.statusFilter ?? '全部',
          deptFilter: payload.deptFilter ?? null,
          timeRange: payload.timeRange ?? '全部',
          q: payload.q ?? '',
          scrollTop: payload.scrollTop ?? 0,
        }));
        setRoute('tickets');
      }}
    />;
  } else if (route === 'me') {
    screen = <MeScreen onTabChange={handleTabChange} badges={badges}
      onOpenCalendar={() => setRoute('calendar')}
      onOpenReportedTickets={() => { setTicketsListState(createTicketsListState('我上报的')); setRoute('tickets'); }}
      onOpenNotifications={() => setRoute('notifications')}
      isAdmin={false}
      notifyUnreadCount={unreadNotifyCount} />;
  } else if (route === 'my-tickets') {
    screen = <MyTicketsScreen tickets={tickets} onBack={() => setRoute('me')}
      listState={myTicketsListState}
      onListStateChange={setMyTicketsListState}
      onTicketClick={(t) => openTicketFromRoute(t, 'my-tickets')} />;
  } else if (route === 'notifications') {
    screen = <NotificationsScreen items={notifications} onBack={() => setRoute('me')}
      listState={notificationsListState}
      onListStateChange={setNotificationsListState}
      onMarkRead={markNotificationRead}
      onDelete={deleteNotification}
      onOpenTicket={(id) => openTicketById(id)} />;
  } else if (route === 'examples') {
    screen = <ExampleLibraryScreen items={EXAMPLE_ITEMS} onBack={() => setRoute('me')} />;
  } else if (route === 'report') {
    screen = <ReportScreen sourceItem={reportSource} onBack={closeReport}
      onSubmit={handleReportSubmit}
      onViewTicket={(t) => openTicketFromRoute(t, 'report')} />;
  } else if (route === 'ticket-detail') {
    screen = <TicketDetail ticket={activeTicket} onBack={() => {
      if (ticketDetailFrom === 'report') setRoute('report');
      else if (ticketDetailFrom === 'dashboard') setRoute('dashboard');
      else if (ticketDetailFrom === 'my-tickets') setRoute('my-tickets');
      else if (ticketDetailFrom === 'notifications') setRoute('notifications');
      else setRoute('tickets');
    }} />;
  } else if (route === 'calendar') {
    screen = <CalendarScreen onBack={() => setRoute('me')} />;
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
      <div style={{ fontSize: 13, color: '#888', letterSpacing: 0.5 }}>
        AI 景区巡检 · 质检人员原型 · v4 高级清爽版
      </div>
      <Phone>{screen}</Phone>
      {route === 'calendar' ? (
        <CalendarDevNotes />
      ) : (
        <div style={{ fontSize: 11, color: '#bbb', textAlign: 'center', lineHeight: '18px', maxWidth: 360 }}>
          非标问题示例库：易误报对照单页，对比图 + 四行说明，无需详情页
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
