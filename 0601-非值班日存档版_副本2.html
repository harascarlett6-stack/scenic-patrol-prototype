function App() {
  // route: 'home' | 'tickets' | 'dashboard' | 'me' | 'my-tickets' | 'notifications' | 'examples' | 'example-detail' | 'report' | 'ticket-detail' | 'calendar' | 'audit'
  const [route, setRoute] = React.useState('home');
  const [userType, setUserType] = React.useState('dutyOff');
  const [managementPersona, setManagementPersona] = React.useState('admin');
  const cycleUserType = () => setUserType(t => {
    const i = USER_TYPE_CYCLE.indexOf(t);
    return USER_TYPE_CYCLE[(i + 1) % USER_TYPE_CYCLE.length];
  });
  const cycleManagementPersona = () => setManagementPersona(p => {
    const i = MANAGEMENT_PERSONA_CYCLE.indexOf(p);
    return MANAGEMENT_PERSONA_CYCLE[(i + 1) % MANAGEMENT_PERSONA_CYCLE.length];
  });
  const activeRoleKey = getManagementRoleKey(userType, managementPersona);
  const [activeTicket, setActiveTicket] = React.useState(null);
  const [tickets] = React.useState(TICKETS);
  const [taskStates, setTaskStates] = React.useState(() => SECTIONS.map(s => Array(s.items.length).fill(null)));
  const [reportSource, setReportSource] = React.useState(null);
  const [ticketDetailFrom, setTicketDetailFrom] = React.useState(null);
  const [auditResolved, setAuditResolved] = React.useState([]);
  const [auditFrom, setAuditFrom] = React.useState('me');
  const [notifications, setNotifications] = React.useState(NOTIFICATIONS);
  const [activeExample, setActiveExample] = React.useState(null);
  const [ticketsListState, setTicketsListState] = React.useState(() => createTicketsListState('我部门的'));
  const [myTicketsListState, setMyTicketsListState] = React.useState(() => createMyTicketsListState());
  const [dashboardState, setDashboardState] = React.useState(() => createDashboardState());
  const [auditListState, setAuditListState] = React.useState(() => createAuditListState('pending'));
  const [notificationsListState, setNotificationsListState] = React.useState(() => createNotificationsListState());
  const roleUser = (HOME_ROLES[activeRoleKey] || HOME_ROLES.dutyOff).user;
  const unreadNotifyCount = notifications.filter(n => notificationForRole(n, userType, roleUser) && n.unread).length;

  React.useEffect(() => {
    if (isManagementRole(userType)) {
      setTicketsListState(prev => prev.scopeTab === '全部工单' ? prev : createTicketsListState('全部工单'));
    }
  }, [userType]);

  const auditPendingTickets = TICKETS.filter(
    t => t.status === '不整改申请中' && !auditResolved.some(r => r.id === t.id)
  );
  const auditReviewedTickets = auditResolved.map(r => {
    const t = TICKETS.find(x => x.id === r.id);
    return t ? { ...t, auditResult: r.result, auditTime: r.auditTime, rejectReason: r.rejectReason } : null;
  }).filter(Boolean);
  const auditPendingCount = auditPendingTickets.length;

  const handleAuditResolve = (id, result, rejectReason = '') => {
    const seq = auditResolved.length + 1;
    const auditTime = `2026-04-30 ${14 + seq}:${10 + seq * 3}`;
    setAuditResolved(prev => [...prev, { id, result, rejectReason, auditTime }]);
  };

  const openAudit = (from, opts = {}) => {
    setAuditFrom(from);
    setAuditListState(createAuditListState(opts.tab || 'pending'));
    setRoute('audit');
  };

  const badges = { tickets: 7, me: unreadNotifyCount };

  const markNotificationRead = (id) => {
    setNotifications(prev => prev.map(n => n.id === id ? { ...n, unread: false } : n));
  };

  const deleteNotification = (id) => {
    setNotifications(prev => prev.filter(n => n.id !== id));
  };

  const openTicketFromRoute = (t, fromRoute) => {
    setActiveTicket(t);
    setTicketDetailFrom(fromRoute);
    setRoute('ticket-detail');
  };

  const openTicketById = (ticketId) => {
    const t = TICKETS.find(x => x.id === ticketId);
    if (t) openTicketFromRoute(t, route);
  };

  const openTicketsFromDetainedReminder = () => {
    setTicketsListState(createTicketsListState(ticketsScopeTabForDetainedReminder(userType), {
      statusFilter: '待处理',
      timeRange: '全部',
      q: '',
      scrollTop: 0,
      deptFilter: null,
    }));
    setRoute('tickets');
  };

  const handleTabChange = (tab) => {
    if (tab === 'tickets') setTicketsListState(createTicketsListState(isManagementRole(userType) ? '全部工单' : '我部门的'));
    if (tab === 'dashboard') setDashboardState(createDashboardState());
    setRoute(tab);
  };

  const openReport = (source) => {
    setReportSource(source || null);
    setRoute('report');
  };

  const closeReport = () => {
    setReportSource(null);
    setRoute('home');
  };

  const handleReportSubmit = () => {
    if (reportSource && reportSource.sIdx != null) {
      const { sIdx, iIdx } = reportSource;
      setTaskStates(prev => {
        const next = prev.map(s => [...s]);
        next[sIdx][iIdx] = 'issue';
        return next;
      });
    }
    setReportSource(null);
    setRoute('home');
  };

  const handleRoleChange = (type) => {
    setUserType(type);
    if (type === 'admin') setManagementPersona('admin');
    setRoute('home');
  };

  React.useEffect(() => {
    window.DATA.currentUser = (HOME_ROLES[activeRoleKey] || HOME_ROLES.dutyOff).user;
  }, [activeRoleKey]);

  let screen;
  if (route === 'home') {
    const role = HOME_ROLES[activeRoleKey] || HOME_ROLES.dutyOff;
    const homeProps = { role, onTabChange: handleTabChange, onOpenReport: openReport, badges };
    if (userType === 'dutyOff') {
      screen = <DutyOffHomeScreen {...homeProps} onCycleUserType={cycleUserType} />;
    } else if (userType === 'receiver') {
      screen = <ReceiverHomeScreen {...homeProps} onOpenDetainedTickets={openTicketsFromDetainedReminder} />;
    } else if (isManagementRole(userType)) {
      const noFixCount = auditPendingCount;
      screen = (
        <ManagementHomeScreen
          {...homeProps}
          noFixCount={noFixCount}
          detainedCount={countDetainedTickets(TICKETS)}
          onOpenAudit={() => openAudit('home', { tab: 'pending' })}
          onOpenDetainedTickets={openTicketsFromDetainedReminder}
          onCyclePersona={cycleManagementPersona}
        />
      );
    }
  } else if (route === 'audit') {
    screen = <AuditScreen
      pendingTickets={auditPendingTickets}
      reviewedTickets={auditReviewedTickets}
      onResolve={handleAuditResolve}
      onBack={() => setRoute(auditFrom)}
      listState={auditListState}
      onListStateChange={setAuditListState}
      onOpenFullTicket={(t) => openTicketFromRoute(t, 'audit')}
    />;
  } else if (route === 'tickets') {
    screen = <TicketsScreen tickets={tickets}
      listState={ticketsListState}
      onListStateChange={setTicketsListState}
      onTicketClick={(t) => openTicketFromRoute(t, 'tickets')}
      onTabChange={handleTabChange} badges={badges} />;
  } else if (route === 'dashboard') {
    screen = <DashboardScreen
      onTabChange={handleTabChange}
      badges={badges}
      listState={dashboardState}
      onListStateChange={setDashboardState}
      onTicketClick={(t) => openTicketFromRoute(t, 'dashboard')}
      onDrillToTickets={(payload) => {
        setTicketsListState(createTicketsListState(payload.scopeTab || '全部工单', {
          statusFilter: payload.statusFilter ?? '全部',
          deptFilter: payload.deptFilter ?? null,
          timeRange: payload.timeRange ?? '全部',
          q: payload.q ?? '',
          scrollTop: payload.scrollTop ?? 0,
        }));
        setRoute('tickets');
      }}
    />;
  } else if (route === 'me') {
    screen = <MeScreen userType={userType} profileRoleKey={activeRoleKey} onTabChange={handleTabChange} badges={badges}
      onOpenCalendar={() => setRoute('calendar')}
      onOpenReportedTickets={() => { setTicketsListState(createTicketsListState('我上报的')); setRoute('tickets'); }}
      onOpenAudit={() => openAudit('me', { tab: 'pending' })}
      onOpenAuditRecords={() => openAudit('me', { tab: 'reviewed' })}
      onOpenProcessedTickets={() => {
        setTicketsListState(createTicketsListState('我部门的', { statusFilter: '待处理' }));
        setRoute('tickets');
      }}
      onOpenNotifications={() => setRoute('notifications')}
      onOpenSysManage={() => setRoute('sys-manage')}
      auditPendingCount={auditPendingCount}
      monthlyAuditReviewedCount={15}
      avgProcessDays={1.8}
      dutyDaysCount={5}
      notifyUnreadCount={unreadNotifyCount} />;
  } else if (route === 'my-tickets') {
    screen = <MyTicketsScreen tickets={tickets} onBack={() => setRoute('me')}
      listState={myTicketsListState}
      onListStateChange={setMyTicketsListState}
      onTicketClick={(t) => openTicketFromRoute(t, 'my-tickets')} />;
  } else if (route === 'notifications') {
    screen = <NotificationsScreen
      items={notifications.filter(n => notificationForRole(n, userType, roleUser))}
      managementNotify={isManagementRole(userType)}
      onBack={() => setRoute('me')}
      listState={notificationsListState}
      onListStateChange={setNotificationsListState}
      onMarkRead={markNotificationRead}
      onDelete={deleteNotification}
      onOpenAudit={(n) => {
        if (n.ticketId) {
          const t = TICKETS.find(x => x.id === n.ticketId);
          if (t) openTicketFromRoute(t, 'notifications');
        } else {
          openAudit('notifications', { tab: 'pending' });
        }
      }}
      onOpenTicket={(id) => openTicketById(id)} />;
  } else if (route === 'examples') {
    screen = <ExampleLibraryScreen items={EXAMPLE_ITEMS} onBack={() => setRoute('me')}
      onOpenDetail={(it) => { setActiveExample(it); setRoute('example-detail'); }} />;
  } else if (route === 'example-detail') {
    screen = <ExampleDetailScreen item={activeExample} onBack={() => setRoute('examples')} />;
  } else if (route === 'report') {
    screen = <ReportScreen sourceItem={reportSource} onBack={closeReport}
      onSubmit={handleReportSubmit}
      onViewTicket={(t) => openTicketFromRoute(t, 'report')} />;
  } else if (route === 'ticket-detail') {
    screen = <TicketDetail ticket={activeTicket}
      readOnly={ticketDetailFrom === 'audit' || (isManagementRole(userType) && ticketDetailFrom === 'tickets')}
      auditView={ticketDetailFrom === 'audit'}
      adminView={isManagementRole(userType)}
      onBack={() => {
      if (ticketDetailFrom === 'report') setRoute('report');
      else if (ticketDetailFrom === 'dashboard') setRoute('dashboard');
      else if (ticketDetailFrom === 'home') setRoute('home');
      else if (ticketDetailFrom === 'audit') setRoute('audit');
      else if (ticketDetailFrom === 'my-tickets') setRoute('my-tickets');
      else if (ticketDetailFrom === 'notifications') setRoute('notifications');
      else setRoute('tickets');
    }} />;
  } else if (route === 'calendar') {
    screen = <CalendarScreen onBack={() => setRoute('me')} viewOnly={userType === 'receiver' || isManagementRole(userType)} />;
  } else if (route === 'sys-manage') {
    screen = <SystemManageScreen onBack={() => setRoute('me')} />;
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
      <div style={{ fontSize: 13, color: '#888', letterSpacing: 0.5 }}>
        AI 景区巡检 · 非值班日原型 · 质检·非值班 / 纯接单 / 管理层
      </div>
      <RoleSwitcher value={userType} onChange={handleRoleChange} />
      <Phone>{screen}</Phone>
      <DevNotes route={route} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
