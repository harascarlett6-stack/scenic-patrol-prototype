function addDaysToTime(timeStr, days, timePart) {

  const y = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');

  const tp = timePart || (String(timeStr || '').match(/\s(\d{2}:\d{2})/)?.[1] || '12:00');

  if (ticket.status === '不整改' && (ticket.auditApplicant || ticket.auditReason || ticket.handleRecords?.some(r => r.type === 'noFixApply'))) return true;
  if (isTicketDetainedOver7(ticket)) return true;

}
function buildTicketTimelineEvents(ticket) {
  const events = [];
  const pushDispatch = (dept, notifyCount, time) => {
    events.push({ kind: 'normal', time, text: `系统派单至${dept}，通知${notifyCount}人` });
  };
  const parseTime = (t) => new Date(String(t || '').replace(' ', 'T')).getTime() || 0;

  if (ticket.handleRecords && ticket.handleRecords.length) {
    ticket.handleRecords.forEach(r => {
      if (r.type === 'dispatch') pushDispatch(r.dept, r.notifyCount || 3, r.time);
      else if (r.type === 'reassign') {
        events.push({
          kind: 'key', time: r.time,
          text: `${timelinePersonLabel(r.operator)} 将工单从${r.fromDept}改派至${r.toDept}`,
          sub: r.reason ? `原因：${r.reason}` : null,
        });
        pushDispatch(r.toDept, r.notifyCount || 5, r.time);
      } else if (r.type === 'noFixApply') {
        events.push({
          kind: 'key', time: r.time,
          text: `${timelinePersonLabel(r.applicant)} 申请不整改`,
          sub: r.reason ? `原因：${r.reason}` : null,
        });
      } else if (r.type === 'auditApproved') {
        events.push({ kind: 'key', time: r.time, text: `${timelinePersonLabel(r.operator || '朱丽锋')} 同意不整改` });
      } else if (r.type === 'auditRejected') {
        events.push({
          kind: 'key', time: r.time,
          text: `${timelinePersonLabel(r.operator || '朱丽锋')} 驳回不整改`,
          sub: r.reason ? `原因：${r.reason}` : null,
        });
      } else if (r.type === 'reminder') {
        events.push({ kind: 'normal', time: r.time, text: r.text || '系统提醒：请填写预计完成时间' });
      } else if (r.type === 'expectedDate') {
        const shortDate = r.date ? String(r.date).slice(5) : '';
        events.push({
          kind: 'normal', time: r.time,
          text: `${timelinePersonLabel(r.operator)} 填写预计完成时间：${shortDate}`,
        });
      }
    });
    if (ticket.auditResult === 'approved' && ticket.auditTime && !events.some(e => e.text.includes('同意不整改'))) {
      events.push({ kind: 'key', time: ticket.auditTime, text: `${timelinePersonLabel('朱丽锋')} 同意不整改` });
    }
    if (ticket.auditResult === 'rejected' && ticket.auditTime && !events.some(e => e.text.includes('驳回不整改'))) {
      events.push({
        kind: 'key', time: ticket.auditTime, text: `${timelinePersonLabel('朱丽锋')} 驳回不整改`,
        sub: ticket.rejectReason ? `原因：${ticket.rejectReason}` : null,
      });
    }
  } else {
    pushDispatch(ticket.dept, 3, ticket.time);
    if (ticket.status === '不整改申请中' || ticket.auditApplicant) {
      events.push({
        kind: 'key',
        time: ticket.noFixApplyTime || addDaysToTime(ticket.time, 1, '09:15'),
        text: `${timelinePersonLabel(ticket.auditApplicant || ticket.who)} 申请不整改`,
        sub: ticket.auditReason ? `原因：${ticket.auditReason}` : null,
      });
    }
    if (isTicketDetainedOver7(ticket)) {
      if (ticket.needExpectedDate) {
        events.push({
          kind: 'normal',
          time: ticket.reminderTime || addDaysToTime(ticket.time, 2, '12:00'),
          text: '系统提醒：请填写预计完成时间',
        });
      }
      if (ticket.expectedDate) {
        events.push({
          kind: 'normal',
          time: ticket.expectedDateFillTime || addDaysToTime(ticket.time, 2, '15:00'),
          text: `${timelinePersonLabel(ticket.expectedFilledBy || ticket.who)} 填写预计完成时间：${String(ticket.expectedDate).slice(5)}`,
        });
      }
    }
  }

  events.sort((a, b) => parseTime(a.time) - parseTime(b.time));

  let warning = null;
  if (isTicketDetainedOver7(ticket)) {
    const days = elapsedDaysSince(ticket.time);
    warning = `已产生${days}天，超出7天预警线`;
  }

  return { events, warning };
}
function getTicketResolveDays(t) {
  if (t.resolveDays != null) return t.resolveDays;
  if (t.doneTime) {
    const start = new Date(t.time.slice(0, 10));
    const end = new Date(String(t.doneTime).slice(0, 10));
    return Math.max(1, Math.floor((end - start) / 86400000));
  }
  return elapsedDaysSince(t.time);
}

function notificationDaysSince(n) {
  if (n.date) {
    const start = new Date(n.date.slice(0, 10));
    const end = new Date(PROTOTYPE_TODAY);
    return Math.max(0, Math.floor((end - start) / 86400000));
  }
  if (n.group === '今天') return 0;
  if (n.group === '昨天') return 1;
  const m = String(n.time || '').match(/^(\d{2})-(\d{2})/);
  if (m) {
    const start = new Date(`2026-${m[1]}-${m[2]}`);
    const end = new Date(PROTOTYPE_TODAY);
    return Math.max(0, Math.floor((end - start) / 86400000));
  }
  return 0;
}

const SWIPE_DELETE_WIDTH = 72;

function SwipeableNotificationRow({ onDelete, onClick, isLast, children }) {
  const [offsetX, setOffsetX] = React.useState(0);
  const [dragging, setDragging] = React.useState(false);
  const startX = React.useRef(0);
  const startOffset = React.useRef(0);
  const offsetRef = React.useRef(0);
  const moved = React.useRef(false);

  const applyOffset = (x) => {
    const v = Math.min(0, Math.max(-SWIPE_DELETE_WIDTH, x));
    offsetRef.current = v;
    setOffsetX(v);
  };

  const onStart = (clientX) => {
    startX.current = clientX;
    startOffset.current = offsetRef.current;
    moved.current = false;
    setDragging(true);
  };
  const onMove = (clientX) => {
    if (!dragging) return;
    const dx = clientX - startX.current;
    if (Math.abs(dx) > 4) moved.current = true;
    applyOffset(startOffset.current + dx);
  };
  const onEnd = () => {
    if (!dragging) return;
    setDragging(false);
    if (offsetRef.current <= -SWIPE_DELETE_WIDTH / 2) {
      onDelete();
    } else {
      applyOffset(0);
    }
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onMouseMove = (e) => onMove(e.clientX);
    const onMouseUp = () => onEnd();
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return () => {
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
    };
  }, [dragging]);

  const handleContentClick = () => {
    if (moved.current || offsetRef.current < -8) return;
    onClick && onClick();
  };

  return (
    <div style={{ position: 'relative', overflow: 'hidden', borderBottom: isLast ? 'none' : `0.5px solid ${C.line}` }}>
      <button type="button" onClick={(e) => { e.stopPropagation(); onDelete(); }} style={{
        position: 'absolute', right: 0, top: 0, bottom: 0, width: SWIPE_DELETE_WIDTH,
        background: C.danger, color: '#fff', border: 'none', fontSize: 14, fontWeight: 500,
        cursor: 'pointer', fontFamily: FONT,
      }}>删除</button>
      <div
        onClick={handleContentClick}
        onTouchStart={(e) => onStart(e.touches[0].clientX)}
        onTouchMove={(e) => onMove(e.touches[0].clientX)}
        onTouchEnd={onEnd}
        onMouseDown={(e) => onStart(e.clientX)}
        style={{
          transform: `translateX(${offsetX}px)`,
          transition: dragging ? 'none' : 'transform 0.2s ease',
          background: C.surface,
          cursor: 'pointer',
          touchAction: 'pan-y',
        }}
      >
        {children}
      </div>
    </div>
  );
}

function TaskItem({ name, tag, state, onConfirm, onReport, onSOP, onShowMediaPicker, isLast }) {
  const [expanded, setExpanded] = React.useState(false);
  const [photos, setPhotos] = React.useState([]);
  const [note, setNote] = React.useState('');
  const [addPhotoHover, setAddPhotoHover] = React.useState(false);
  const [addPhotoActive, setAddPhotoActive] = React.useState(false);
  const [noteFocused, setNoteFocused] = React.useState(false);
  const [submitting, setSubmitting] = React.useState(false);
  const noteRef = React.useRef(null);
  const maxPhotos = 3;
  const THUMB = 50;
  const NOTE_PLACEHOLDER = '备注（选填） 例：1号灭火器位置正常';
  const EXPAND_BG = '#F5FBF7';
  const PHOTO_BORDER = '#E5E7EB';
  const INPUT_BORDER = '#D1D5DB';
  const CONFIRM_NORMAL_BTN = { enabled: '#22C55E', pressed: '#16A34A' };
  const [btnPressed, setBtnPressed] = React.useState(false);
  const tagStyle = tag === '必查' ? { color: '#666', background: '#F5F5F5' } : { color: C.warn, background: '#FFF7E8' };
  const isDone = state === 'done';
  const isIssue = state === 'issue';
  const canConfirm = photos.length > 0;
  const checkSelected = expanded || isDone;

  const syncNoteHeight = () => {
    const el = noteRef.current;
    if (!el) return;
    el.style.height = '36px';
    el.style.height = `${Math.max(36, Math.min(el.scrollHeight, 80))}px`;
  };

  React.useLayoutEffect(() => {
    if (expanded) syncNoteHeight();
  }, [note, expanded]);

  const collapse = () => { setExpanded(false); setPhotos([]); setNote(''); setSubmitting(false); setBtnPressed(false); };

  const handleCheckClick = (e) => {
    e.stopPropagation();
    if (isDone || isIssue) return;
    if (expanded) collapse();
    else setExpanded(true);
  };

  const handleRowClick = () => {
    if (expanded) collapse();
    else onSOP();
  };

  const handleReportClick = (e) => {
    e.stopPropagation();
    if (isDone) return;
    collapse();
    onReport();
  };

  const handleConfirm = (e) => {
    e.stopPropagation();
    if (!canConfirm || submitting) return;
    setSubmitting(true);
    window.setTimeout(() => {
      onConfirm();
      collapse();
    }, 550);
  };

  const addPhoto = (e) => {
    e.stopPropagation();
    if (photos.length >= maxPhotos) return;
    onShowMediaPicker(() => {
      setPhotos(p => p.length < maxPhotos ? [...p, { id: Date.now() }] : p);
    });
  };

  const removePhoto = (e, i) => {
    e.stopPropagation();
    setPhotos(p => p.filter((_, j) => j !== i));
  };

  const thumbBox = (child) => ({
    width: THUMB, height: THUMB, borderRadius: 8, flexShrink: 0,
    background: '#fff', border: `1px dashed ${PHOTO_BORDER}`,
    display: 'flex', alignItems: 'center', justifyContent: 'center',
  });

  const photoHint = photos.length > 0
    ? `已选 ${photos.length} 张，可继续添加`
    : '请添加照片（至少1张）';

  return (
    <div style={{ background: '#fff', borderBottom: isLast ? 'none' : `0.5px solid ${C.line}` }}>
      <div style={{ display: 'flex', alignItems: 'center', minHeight: 48, padding: '0 16px', gap: 8 }}>

  usePreloadPhotos(photos);

  const TAP_SLOP = 10;

  const openLightbox = (i) => {
    if (onImageClick) onImageClick(i ?? index);
  };

  const onPointerDown = (e) => {
    if (e.button !== undefined && e.button !== 0) return;
    dragRef.current = {
      active: true,
      startX: e.clientX,
      startY: e.clientY,
      axis: null,
      dragX: 0,
      moved: false,
      suppressClick: false,
    };
    if (multi) setDragging(true);
  };

  const onPointerMove = (e) => {
    if (!dragRef.current.active) return;
    const dx = e.clientX - dragRef.current.startX;
    const dy = e.clientY - dragRef.current.startY;
    if (!dragRef.current.moved && (Math.abs(dx) > TAP_SLOP || Math.abs(dy) > TAP_SLOP)) {
      dragRef.current.moved = true;
    }
    if (!dragRef.current.axis) {
      if (Math.abs(dx) > TAP_SLOP || Math.abs(dy) > TAP_SLOP) {
        dragRef.current.axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
      }
    }
    if (multi && dragRef.current.axis === 'x') {
      let offset = dx;
      if (index === 0 && offset > 0) offset *= 0.3;
      if (index === photos.length - 1 && offset < 0) offset *= 0.3;
      dragRef.current.dragX = offset;
      setDragX(offset);
    }
  };

  const onPointerUp = (e) => {
    if (!dragRef.current.active) return;
    const dx = e.clientX - dragRef.current.startX;
    const dy = e.clientY - dragRef.current.startY;
    const w = trackRef.current?.offsetWidth || 1;
    const { axis, moved, dragX: slideDx } = dragRef.current;
    const isTap = !moved && Math.abs(dx) <= TAP_SLOP && Math.abs(dy) <= TAP_SLOP;

    dragRef.current.active = false;
    setDragging(false);
    dragRef.current.dragX = 0;
    setDragX(0);

    if (isTap) {
      openLightbox(index);
      return;
    }

    dragRef.current.suppressClick = true;
    if (multi && axis === 'x' && Math.abs(slideDx) > w * 0.2) {
      onIndexChange(slideDx < 0 ? Math.min(index + 1, photos.length - 1) : Math.max(index - 1, 0));
    }
  };

  const onClick = (e) => {
    e.stopPropagation();
    if (dragRef.current.suppressClick) {
      dragRef.current.suppressClick = false;
      return;
    }
    openLightbox(index);
  };

  const w = trackRef.current?.offsetWidth || 1;
  const dragPct = dragging ? (dragX / w) * 100 : 0;
  const translateX = -(index * 100) + dragPct;

  return (
    <div
      ref={trackRef}
      role={onImageClick ? 'button' : undefined}
      tabIndex={onImageClick ? 0 : undefined}
      onClick={onClick}
      onKeyDown={onImageClick ? (e) => { if (e.key === 'Enter') openLightbox(index); } : undefined}
      style={{
        position: 'relative', overflow: 'hidden', aspectRatio, background: '#000',
        touchAction: multi ? 'pan-y' : 'auto', userSelect: 'none',
        cursor: onImageClick ? 'pointer' : 'default', ...style,
      }}
      onPointerDown={onPointerDown}
      onPointerMove={onPointerMove}
      onPointerUp={onPointerUp}
      onPointerCancel={onPointerUp}
    >
      <div style={{
        display: 'flex', height: '100%',
        transform: `translateX(${translateX}%)`,
        transition: dragging ? 'none' : 'transform 300ms ease',
        willChange: 'transform',
        pointerEvents: 'none',
      }}>
        {photos.map((p, i) => (
          <div
            key={p.id ?? i}
            style={{ flex: '0 0 100%', width: '100%', height: '100%' }}
          >
            <img
              src={p.url}
              alt=""
              draggable={false}
              style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}
            />
          </div>
        ))}
      </div>
      <PhotoPageBadge index={index} total={photos.length} variant="corner" />
    </div>
  );
}

function PhotoFullscreenViewer({ photos, index, onClose, onIndexChange }) {
  const multi = photos.length > 1;
  const [scale, setScale] = React.useState(1);
  const [pan, setPan] = React.useState({ x: 0, y: 0 });
  const [dismissY, setDismissY] = React.useState(0);
  const dragRef = React.useRef(null);
  const pinchRef = React.useRef({ dist: 0, baseScale: 1 });
  const lastTapRef = React.useRef(0);
  const wrapRef = React.useRef(null);

  usePreloadPhotos(photos);

  React.useEffect(() => {
    setScale(1);
    setPan({ x: 0, y: 0 });
    setDismissY(0);
  }, [index]);

  const clampIndex = (i) => Math.max(0, Math.min(i, photos.length - 1));

  const onPointerDown = (e) => {
    if (scale > 1) {
      dragRef.current = { mode: 'pan', x0: e.clientX, y0: e.clientY, panX: pan.x, panY: pan.y };
    } else {
      dragRef.current = { mode: 'slide', x0: e.clientX, y0: e.clientY, dx: 0, dy: 0 };
    }
    e.currentTarget.setPointerCapture?.(e.pointerId);
  };

  const onPointerMove = (e) => {
    const d = dragRef.current;
    if (!d) return;
    const dx = e.clientX - d.x0;
    const dy = e.clientY - d.y0;
    if (d.mode === 'pan') {
      setPan({ x: d.panX + dx, y: d.panY + dy });
      return;
    }
    d.dx = dx;
    d.dy = dy;
    if (Math.abs(dx) > Math.abs(dy) || !multi) {
      setDismissY(0);
    } else if (dy > 0) {
      setDismissY(dy);
    }
  };

  const onPointerUp = () => {
    const d = dragRef.current;
    if (!d) return;
    const vw = wrapRef.current?.offsetWidth || 1;
    if (d.mode === 'slide' && scale <= 1) {
      if (Math.abs(d.dx) > Math.abs(d.dy) && Math.abs(d.dx) > vw * 0.18 && multi) {
        onIndexChange(clampIndex(d.dx < 0 ? index + 1 : index - 1));
      } else if (d.dy > 100) {
        onClose();
      }
    }
    setDismissY(0);
    dragRef.current = null;
  };

  const onTouchStart = (e) => {
    if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      pinchRef.current = { dist, baseScale: scale };
    }
  };

  const onTouchMove = (e) => {
    if (e.touches.length === 2 && pinchRef.current.dist) {
      e.preventDefault();
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const next = Math.min(3, Math.max(1, pinchRef.current.baseScale * (dist / pinchRef.current.dist)));
      setScale(next);
      if (next <= 1) setPan({ x: 0, y: 0 });
    }
  };

  const onTouchEnd = () => {
    pinchRef.current = { dist: 0, baseScale: scale };
  };

  const onImageClick = (e) => {
    e.stopPropagation();
    const now = Date.now();
    if (now - lastTapRef.current < 320) {
      if (scale > 1) {
        setScale(1);
        setPan({ x: 0, y: 0 });
      } else {
        setScale(2.5);
      }
      lastTapRef.current = 0;
    } else {
      lastTapRef.current = now;
    }
  };

  const p = photos[index];
  const wrapOpacity = dismissY > 0 ? Math.max(0.4, 1 - dismissY / 240) : 1;

  return (
    <div
      style={{
        position: 'absolute', inset: 0, zIndex: 500, background: '#000',
        display: 'flex', flexDirection: 'column', overflow: 'hidden',
        opacity: wrapOpacity, transform: dismissY > 0 ? `translateY(${dismissY}px)` : 'none',
        transition: dragRef.current ? 'none' : 'opacity 200ms ease, transform 200ms ease',
      }}
      onClick={onClose}
    >
      <PhotoPageBadge index={index} total={photos.length} variant="top" />
      <button
        type="button"
        onClick={(e) => { e.stopPropagation(); onClose(); }}
        aria-label="关闭"
        style={{
          position: 'absolute', top: 48, right: 12, zIndex: 6,
          width: 44, height: 44, border: 'none', borderRadius: 22,
          background: 'rgba(255,255,255,0.12)', color: '#fff', fontSize: 20,
          cursor: 'pointer', fontFamily: FONT, lineHeight: 1,
        }}
      >✕</button>
      <div
        ref={wrapRef}
        style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden', touchAction: 'none' }}
        onClick={e => e.stopPropagation()}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerCancel={onPointerUp}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
      >
        <img
          src={p?.url}
          alt=""
          draggable={false}
          onClick={onImageClick}
          style={{
            maxWidth: '92%', maxHeight: '82%', objectFit: 'contain',
            transform: `translate(${pan.x}px, ${pan.y}px) scale(${scale})`,
            transition: dragRef.current ? 'none' : 'transform 200ms ease',
            cursor: scale > 1 ? 'grab' : 'zoom-in',
          }}
        />
      </div>
    </div>
  );
}

                onReject={() => { setRejectTarget(t.id); setApproveTarget(null); }}
                onApprove={() => setApproveTarget(t.id)}

            ))}
          </div>
        )}
      </div>
      {approveTarget && (
        <AuditApproveModal onCancel={() => setApproveTarget(null)} onConfirm={() => handleApprove(approveTarget)} />

      {rejectTarget && (
        <AuditRejectSheet
          reason={rejectDraft}

          onClose={() => setListPhotoView(null)}
          onIndexChange={(i) => setListPhotoView(v => ({ ...v, index: i }))}
        />
      )}
    </div>
  );

          ))}
        </BottomSheet>
      )}
    </div>
  );
}

const ITEM_RECOMMENDATIONS = {

};

const VOICE_MOCK_DESC = '河坊街灯箱第5号不亮，影响夜间照明';

function inferCatFromDesc(text) {
  const t = text;
  if (/灯|灯箱|标识|护栏|设施|设备|螺丝|门锁|照明|破损|损坏|松动|故障/.test(t)) return '设施设备';
  if (/卫生|油污|异味|脏|垃圾|洗手|厕所|卫生间|气味/.test(t)) return '卫生管理';
  if (/消防|安全|疏散|占用|通道/.test(t)) return '安全管理';
  if (/演出|表演|千古情|座椅|舞台/.test(t)) return '演出管理';
  if (/氛围|灯笼|布置|装饰/.test(t)) return '氛围管理';
  if (/服务|态度|礼仪|仪容/.test(t)) return '服务状态';
  if (/餐饮|食品|档口/.test(t)) return '餐饮管理';
  if (/店铺|商铺|柜台/.test(t)) return '店铺管理';
  if (/施工|用电|工程/.test(t)) return '工程管理';
  return '';
}

function inferDeptFromDesc(text, cat) {
  const t = text;
  if (/灯|灯箱|标识|护栏|照明|设施|设备|螺丝|门锁|破损|损坏|松动|故障/.test(t)) return '工程部';
  if (/消防|安全|疏散/.test(t)) return '安全部';
  if (/卫生|油污|异味|洗手|厕所|卫生间|气味|垃圾/.test(t)) return '商业管理部';
  if (/演出|千古情|座椅|舞台|表演/.test(t)) return '剧场部';
  if (/后勤|仓库|库房|采购|货架/.test(t)) return '采购部';
  if (/餐饮|档口|食品/.test(t)) return '餐饮部';
  if (/服务|仪容/.test(t)) return '人力资源部';
  if (cat === '设施设备' || cat === '工程管理') return '工程部';
  if (cat === '卫生管理') return '商业管理部';
  if (cat === '安全管理') return '安全部';
  if (cat === '演出管理') return '剧场部';
  return '';
}

function inferAreaFromDesc(text) {
  const t = text;
  if (/河坊街|水街|宋城大道|怪街|街区/.test(t)) return '街区';
  if (/洗手间|厕所|卫生间/.test(t)) return '洗手间';
  if (/后勤|仓库|库房|办公/.test(t)) return '后勤区';
  if (/剧院|剧场|千古情|座椅/.test(t)) return '剧院';
  if (/广场|大门|入口/.test(t)) return '广场';
  if (/店铺|商铺|档口|餐饮/.test(t)) return '店铺';
  return '';
}

function formatTicketDate(timeStr) {
  const m = String(timeStr || '').match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return '';
  return `${parseInt(m[2], 10)}月${parseInt(m[3], 10)}日`;
}

function findSimilarTicket(cat, dept, loc) {
  if (!cat || !dept || !loc) return null;
  return TICKETS.find(t =>
    t.cat === cat && t.dept === dept && t.loc === loc &&
    t.status !== '已整改' && t.status !== '不整改'
  ) || null;
}

        <span style={{ fontSize: 13, fontWeight: 600, color: C.warn }}>检测到相似工单</span>

function ReportScreen({ sourceItem, onBack, onSubmit, onViewTicket }) {
  const rec = sourceItem ? (ITEM_RECOMMENDATIONS[sourceItem.name] || { cat: '其他', dept: '运营部' }) : null;
  const [voiceRecording, setVoiceRecording] = React.useState(false);
  const [voiceDuration, setVoiceDuration] = React.useState(0);
  const [desc, setDesc] = React.useState('');
  const [submitted, setSubmitted] = React.useState(false);
  const [areaType, setAreaType] = React.useState('');
  const [detailLoc, setDetailLoc] = React.useState('');
  const [cat, setCat] = React.useState(rec?.cat || '');
  const [dept, setDept] = React.useState(rec?.dept || '');
  const [deptAiRecommended, setDeptAiRecommended] = React.useState(false);
  const [deptModified, setDeptModified] = React.useState(false);
  const aiDeptRef = React.useRef('');
  const [itemRecommended, setItemRecommended] = React.useState(!!rec?.cat);
  const [urgent, setUrgent] = React.useState('常规');
  const [showAreaPicker, setShowAreaPicker] = React.useState(false);
  const [showCatPicker, setShowCatPicker] = React.useState(false);
  const [showDeptPicker, setShowDeptPicker] = React.useState(false);
  const [showMediaPicker, setShowMediaPicker] = React.useState(false);
  const [photos, setPhotos] = React.useState([]);
  const [similarDismissed, setSimilarDismissed] = React.useState(false);
  const [aiAnalyzing, setAiAnalyzing] = React.useState(false);
  const [aiFieldsReveal, setAiFieldsReveal] = React.useState(true);
  const [areaAutoDetected, setAreaAutoDetected] = React.useState(false);
  const areaAutoRef = React.useRef(false);
  React.useEffect(() => { areaAutoRef.current = areaAutoDetected; }, [areaAutoDetected]);

  const deptBadge = deptModified ? '已修改' : (deptAiRecommended && dept ? 'AI推荐' : null);
  const descReady = desc.trim().length > 5;
  const pendingRecHint = descReady ? '待推荐' : '请选择';
  const similarTicket = React.useMemo(() => {
    if (similarDismissed || !cat || !dept || !areaType) return null;
    return findSimilarTicket(cat, dept, areaType);
  }, [cat, dept, areaType, similarDismissed]);

  React.useEffect(() => { setSimilarDismissed(false); }, [cat, dept, areaType]);
  const canSubmit = desc.trim().length > 0 && photos.length > 0 && areaType && cat && dept;

  React.useEffect(() => {
    let timer;
    if (voiceRecording) timer = setInterval(() => setVoiceDuration(d => d + 0.1), 100);
    return () => clearInterval(timer);
  }, [voiceRecording]);

  React.useEffect(() => {
    const text = desc.trim();
    if (text.length <= 5) {
      setAiAnalyzing(false);
      return;
    }
    setAiAnalyzing(true);
    const timer = setTimeout(() => {
      const inferredCat = inferCatFromDesc(text);
      const inferredDept = inferDeptFromDesc(text, inferredCat);
      const inferredArea = inferAreaFromDesc(text);
      setAiFieldsReveal(false);
      requestAnimationFrame(() => {
        if (inferredCat) { setCat(inferredCat); setItemRecommended(true); }
        if (inferredDept) {
          setDept(inferredDept);
          setDeptAiRecommended(true);
          setDeptModified(false);
          aiDeptRef.current = inferredDept;
        }
        if (inferredArea) {
          setAreaType(inferredArea);
          setAreaAutoDetected(true);
        } else if (areaAutoRef.current) {
          setAreaType('');
          setAreaAutoDetected(false);
        }
        setAiAnalyzing(false);
        requestAnimationFrame(() => setAiFieldsReveal(true));
      });
    }, 500);
    return () => clearTimeout(timer);
  }, [desc]);

  const voiceToText = (append) => {
    setDesc(prev => {
      const t = prev.trim();
      if (append && t) return `${t} ${VOICE_MOCK_DESC}`;
      return VOICE_MOCK_DESC;
    });
  };
  const userSetCat = (v) => { setCat(v); setItemRecommended(false); };
  const userSetArea = (v) => { setAreaType(v); setAreaAutoDetected(false); };
  const selectDept = (d) => {
    setDept(d);
    if (deptAiRecommended && d !== aiDeptRef.current) setDeptModified(true);
    setShowDeptPicker(false);
  };
  const addMedia = (type) => {
    if (photos.length >= MAX_MEDIA) return;
    setShowMediaPicker(false);
    setPhotos(p => [...p, { id: Date.now(), type }]);
  };
  const removeMedia = (i) => setPhotos(p => p.filter((_, j) => j !== i));
  const submit = () => { setSubmitted(true); setTimeout(() => onSubmit && onSubmit(), 1500); };

  const getBottomHint = () => {
    if (canSubmit) return '确认提交并派单';
    if (aiAnalyzing) return 'AI正在分析...';
    if (!desc.trim()) return '请先描述问题';
    if (photos.length === 0) return '请先拍照上传';
    if (!areaType) return '请选择所在区域';
    if (!dept) return '请完善必填项';
    if (!cat) return '请完善必填项';
    return '请完善必填项';
  };

  if (submitted) {
    return (
      <div style={{ flex: 1, background: C.surface, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 28, textAlign: 'center' }}>
        <div style={{ width: 72, height: 72, borderRadius: 36, background: C.successSoft, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20 }}>
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M8 18l7 7 13-13" stroke={C.success} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{ fontSize: 20, fontWeight: 600, color: C.text, marginBottom: 8 }}>提交成功</div>
        <div style={{ fontSize: 14, color: C.textSec, lineHeight: 1.7 }}>工单 GD20260429008<br/>已自动派发至 <strong style={{ color: C.text }}>{dept}</strong></div>
      </div>
    );
  }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.bg, overflow: 'hidden', position: 'relative' }}>
      <TopBar title={sourceItem ? '异常上报' : '问题上报'} onBack={onBack} />
      <div style={{ flex: 1, overflowY: 'auto', WebkitOverflowScrolling: 'touch', paddingBottom: SCROLL_PAD_STICKY_FOOTER }}>
        {sourceItem && (
          <div style={{ margin: '8px 12px 0', padding: '6px 10px', background: C.surface, borderRadius: 6, fontSize: 12, color: C.textSec }}>
            来源 <span style={{ color: C.text, fontWeight: 500 }}>{sourceItem.name} · {sourceItem.tag}</span>
          </div>
        )}
        <div style={{ margin: sourceItem ? 8 : 10, marginBottom: 8, background: C.surface, borderRadius: 12, overflow: 'hidden' }}>
          <div style={REPORT_BLOCK_PAD}>
            <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10 }}>
              <span style={{ fontSize: 13, color: C.text, fontWeight: 500 }}>上传照片 <span style={{ color: C.textTer, fontWeight: 400 }}>· 至少 1 张</span></span>
              <span style={{ fontSize: 11, color: photos.length > 0 ? C.success : C.textTer, fontFamily: MONO }}>
                {photos.length > 0 ? `${photos.length}/${MAX_MEDIA} ✓` : `0/${MAX_MEDIA}`}
              </span>
            </div>
            <div style={{ display: 'flex', gap: 8, overflowX: 'auto' }}>
              {photos.map((p, i) => (
                <div key={p.id} style={{ position: 'relative', flexShrink: 0 }}>
                  <div style={{ width: MEDIA_THUMB, height: MEDIA_THUMB, borderRadius: 8, background: C.surfaceAlt, border: `1px solid ${C.line}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <svg width="22" height="20" viewBox="0 0 28 26" fill="none"><path d="M2 7h5l2.5-4h9L21 7h5v17H2z" stroke={C.textTer} strokeWidth="1.5"/><circle cx="14" cy="15.5" r="4" stroke={C.textTer} strokeWidth="1.5"/></svg>
                  </div>
                  <button onClick={() => removeMedia(i)} style={{ position: 'absolute', top: -5, right: -5, width: 18, height: 18, borderRadius: 9, background: 'rgba(0,0,0,0.55)', border: 'none', color: '#fff', fontSize: 12, cursor: 'pointer', fontFamily: FONT }}>✕</button>
                </div>
              ))}
              {photos.length < MAX_MEDIA && (
                <button onClick={() => setShowMediaPicker(true)} style={{ width: MEDIA_THUMB, height: MEDIA_THUMB, flexShrink: 0, borderRadius: 8, border: `1.5px dashed ${C.lineStrong}`, background: C.surfaceAlt, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2, cursor: 'pointer', fontFamily: FONT }}>
                  <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke={C.textTer} strokeWidth="1.8" strokeLinecap="round"/></svg>
                  <span style={{ fontSize: 10, color: C.textTer }}>添加</span>
                </button>
              )}
            </div>
          </div>
          {similarTicket && (
            <SimilarTicketBanner
              ticket={similarTicket}
              onView={(t) => onViewTicket && onViewTicket(t)}
              onDismiss={() => setSimilarDismissed(true)}
            />
          )}
          <div style={{ height: 12, background: C.bg }} />
          <div style={{ paddingTop: 12, opacity: aiFieldsReveal ? 1 : 0, transition: 'opacity 300ms ease' }}>
            <FieldRow compact label="问题类别"
              value={cat || (descReady ? '待推荐' : '请选择')}
              placeholder={!cat}
              aiFilled={!!cat && itemRecommended}
              badge={itemRecommended && cat ? '推荐' : undefined}
              onClick={() => setShowCatPicker(true)} />
            <Hairline inset={12} />
            <DeptConfirmField dept={dept} badge={deptBadge}
              emptyHint={!dept && descReady ? pendingRecHint : undefined}
              onModify={() => setShowDeptPicker(true)}
              onOpen={() => setShowDeptPicker(true)} />
            <Hairline inset={12} />
            <FieldRow compact label="所在区域"
              value={areaType || (descReady ? '待推荐' : '请选择')}
              placeholder={!areaType}
              aiFilled={!!areaType && areaAutoDetected}
              badge={areaAutoDetected && areaType ? '自动识别' : undefined}
              onClick={() => setShowAreaPicker(true)} />
          </div>
          <Hairline inset={0} />
          <div style={REPORT_BLOCK_PAD}>
            <div style={{ fontSize: 13, color: C.textSec, marginBottom: 8 }}>问题描述（含详细地点）<span style={{ color: C.danger }}> *</span></div>
            <div style={{ position: 'relative' }}>
              <textarea value={desc} onChange={e => setDesc(e.target.value)} placeholder="请描述问题详情及详细地点（如：3号剧院B区第2排座椅旁）" rows={3}
                style={{ width: '100%', minHeight: 72, padding: desc.trim() ? '10px 40px 10px 12px' : '10px 12px', fontSize: 14, color: C.text, border: `1px solid ${C.line}`, borderRadius: 8, fontFamily: FONT, resize: 'none', outline: 'none', boxSizing: 'border-box', lineHeight: 1.5 }} />
              {desc.trim().length > 0 && (
                <button type="button" onClick={() => voiceToText(true)} title="语音输入"
                  style={{
                    position: 'absolute', right: 8, bottom: 8, width: 24, height: 24, borderRadius: 12,

  if (!shouldShowTicketTimeline(ticket)) return null;
  const { events, warning } = buildTicketTimelineEvents(ticket);
  if (!events.length) return null;
  return (
    <div style={{ background: C.surface, marginTop: 8, padding: '14px 16px 16px' }}>
      <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 10 }}>处理动态</div>
      <div style={{ height: 0.5, background: C.line, marginBottom: 14 }} />
      <div>
        {events.map((ev, i) => (
          <div key={i} style={{ display: 'flex', gap: 10, position: 'relative', paddingBottom: i < events.length - 1 ? 14 : 0 }}>
            <div style={{ width: 9, flexShrink: 0, position: 'relative', display: 'flex', justifyContent: 'center' }}>
              {i < events.length - 1 && (
                <div style={{ position: 'absolute', top: 9, bottom: -14, left: '50%', width: 1, marginLeft: -0.5, background: C.line }} />
              )}

            <div style={{ flex: 1, minWidth: 0, paddingBottom: 2 }}>
              <div style={{ fontSize: 13, color: C.text, lineHeight: 1.55 }}>
                <span style={{ color: C.textTer, fontFamily: MONO, marginRight: 8 }}>{formatTimelineTime(ev.time)}</span>
                {ev.text}
              </div>

                <div style={{ fontSize: 12, color: C.textSec, marginTop: 4, lineHeight: 1.55, paddingLeft: 86 }}>{ev.sub}</div>

        }}>

}

function TicketsScreen({ tickets, onTicketClick, onTabChange, badges, listState, onListStateChange }) {
  const user = window.DATA.currentUser || CURRENT_USER;
  const scrollRef = React.useRef(null);
  const { scopeTab, statusFilter, timeRange, q, scrollTop, deptFilter } = listState;
  const patchListState = (patch) => onListStateChange({ ...listState, ...patch });
  React.useLayoutEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollTop || 0;
  }, []);
  const handleOpenTicket = (t) => {
    const st = scrollRef.current ? scrollRef.current.scrollTop : 0;
    onListStateChange({ ...listState, scrollTop: st });
    onTicketClick(t);
  };
  const matchSearch = (t) => !q.trim() || [t.desc, t.loc, t.who, t.id, t.dept].some(s => s.includes(q.trim()));
  const matchTicket = (t, scope, status, range = timeRange) => {
    const scopeOk = scope === '我上报的' ? t.who === user.name
      : scope === '我部门的' ? t.dept === user.dept : true;
    const statusOk = status === '全部' ? true
      : status === '待处理' ? t.status === '待处理'
      : t.status === status;
    const rangeOk = isTicketInTimeRange(t, range);
    const timeOk = isTicketInListScope(t, status);
    const deptOk = !deptFilter || t.dept === deptFilter;
    return scopeOk && statusOk && rangeOk && timeOk && deptOk;
  };
  const filterList = (scope, status, range = timeRange) => tickets.filter(t => matchTicket(t, scope, status, range) && matchSearch(t));
  const list = sortTicketsForList(filterList(scopeTab, statusFilter), statusFilter);
  const scopeTabs = ['我上报的', '我部门的', '全部工单'];
  const statusFilters = ['全部', '待处理', '已整改', '不整改'];
  const summaryTotal = tickets.filter(t => matchTicket(t, '全部工单', statusFilter, timeRange)).length;
  const summaryDept = tickets.filter(t => matchTicket(t, '我部门的', statusFilter, timeRange)).length;
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.bg, overflow: 'hidden' }}>
      <div style={{ background: C.surface, padding: '14px 16px 0', paddingTop: MAIN_TAB_TOP_PAD }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 14 }}>
          <span style={{ fontSize: 17, fontWeight: 600, color: C.text }}>工单</span>
          <span style={{ fontSize: 12, color: C.textTer }}>
            <>共 <span style={{ color: C.text, fontWeight: 500 }}>{summaryTotal}</span> 单 · 我部门 <span style={{ color: C.text, fontWeight: 500 }}>{summaryDept}</span> 单</>
          </span>
        </div>
        <div style={{ display: 'flex', width: '100%', marginBottom: 12 }}>
          {scopeTabs.map(g => (
            <button key={g} onClick={() => patchListState({ scopeTab: g, scrollTop: 0, deptFilter: null })} style={{
              flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
              padding: '8px 4px', background: 'none', border: 'none', cursor: 'pointer',
              borderBottom: scopeTab === g ? `2px solid ${C.brand}` : '2px solid transparent',
              color: scopeTab === g ? C.brand : C.textSec, fontSize: 14, fontWeight: scopeTab === g ? 600 : 400, fontFamily: FONT,
              textAlign: 'center', whiteSpace: 'nowrap',
            }}>{g} <span style={{ fontWeight: 400, fontSize: 12 }}>({filterList(g, statusFilter).length})</span></button>
          ))}
        </div>
        <div style={{ display: 'flex', width: '100%', marginBottom: 10, gap: 6 }}>
          {statusFilters.map(s => (
            <button key={s} onClick={() => patchListState({ statusFilter: s, scrollTop: 0 })} style={{
              flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
              padding: '6px 4px', borderRadius: 14, border: 'none', cursor: 'pointer', fontFamily: FONT, fontSize: 12,
              background: statusFilter === s ? C.brandSoft : C.surfaceAlt,
              color: statusFilter === s ? C.brand : C.textSec,
              fontWeight: statusFilter === s ? 600 : 400, textAlign: 'center',
            }}>{s}</button>
          ))}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '0 0 10px' }}>
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8, height: 32, padding: '0 10px', background: C.surfaceAlt, borderRadius: 6, minWidth: 0 }}>
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke={C.textTer} strokeWidth="1.4"/><path d="M11 11l3 3" stroke={C.textTer} strokeWidth="1.4" strokeLinecap="round"/></svg>
            <input value={q} onChange={e => patchListState({ q: e.target.value, scrollTop: 0 })}
              placeholder={scopeTab === '全部工单' ? '搜索工单描述、区域、部门、发现人…' : '搜索工单描述、区域、发现人…'}
              style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 13, fontFamily: FONT, color: C.text, minWidth: 0 }} />
          </div>
          <TimeRangeSelect value={timeRange} onChange={v => patchListState({ timeRange: v, scrollTop: 0 })} />
        </div>
        {statusFilter === '待处理' && (
          <div style={{ padding: '0 0 8px', fontSize: 11, color: '#999', lineHeight: 1.4 }}>
            立即处理 &gt; 滞留工单 &gt; 其他待处理
          </div>
        )}
      </div>
      {deptFilter && (
        <div style={{ padding: '6px 16px', fontSize: 11, color: C.textTer, background: C.brandSoft, borderBottom: `0.5px solid ${C.line}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span>部门筛选 · <span style={{ color: C.brand, fontWeight: 500 }}>{deptFilter}</span></span>
          <button type="button" onClick={() => patchListState({ deptFilter: null, scrollTop: 0 })} style={{ background: 'none', border: 'none', color: C.brand, fontSize: 11, cursor: 'pointer', fontFamily: FONT, padding: 0 }}>清除</button>
        </div>
      )}
      {!deptFilter && scopeTab === '我部门的' && (
        <div style={{ padding: '6px 16px', fontSize: 11, color: C.textTer, background: C.surfaceAlt, borderBottom: `0.5px solid ${C.line}` }}>
          当前部门 · <span style={{ color: C.textSec }}>{user.dept}</span>
        </div>
      )}
      <div ref={scrollRef} style={{ flex: 1, overflow: 'auto', background: C.surface }}>
        {list.map((t, i) => <TicketRow key={t.id} t={t} onClick={() => handleOpenTicket(t)} isLast={i === list.length - 1} />)}
        {list.length === 0 && <div style={{ padding: 60, textAlign: 'center', color: C.textTer, fontSize: 13 }}>
          暂无{timeRange !== '全部' ? timeRange : ''}{statusFilter === '全部' ? '' : statusFilter}工单
        </div>}
      </div>
      <BottomTabs active="tickets" onChange={onTabChange} badges={badges} />
    </div>
  );
}

          </div>
          {onRemove && (
            <button type="button" onClick={(e) => { e.stopPropagation(); onRemove(i); }} style={{ position: 'absolute', top: -5, right: -5, width: 18, height: 18, borderRadius: 9, background: 'rgba(0,0,0,0.55)', border: 'none', color: '#fff', fontSize: 12, cursor: 'pointer', fontFamily: FONT }}>✕</button>
          )}
        </div>
      ))}
      {photos.length < max && onAdd && (
        <button type="button" onClick={onAdd} style={{ width: MEDIA_THUMB, height: MEDIA_THUMB, flexShrink: 0, borderRadius: 8, border: `1.5px dashed ${C.lineStrong}`, background: C.surfaceAlt, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2, cursor: 'pointer', fontFamily: FONT }}>
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke={C.textTer} strokeWidth="1.8" strokeLinecap="round"/></svg>
          <span style={{ fontSize: 10, color: C.textTer }}>添加</span>
        </button>
      )}
    </div>
  );
}

function VoiceInputBar({ value, onChange, placeholder }) {
  const [recording, setRecording] = React.useState(false);
  const [duration, setDuration] = React.useState(0);
  React.useEffect(() => {
    let timer;
    if (recording) timer = setInterval(() => setDuration(d => d + 0.1), 100);
    return () => clearInterval(timer);
  }, [recording]);
  const stopRecord = () => {
    setRecording(false);
    if (duration > 0.3) onChange((value || '') + (value ? ' ' : '') + '整改已完成，现场情况见照片。');
    setDuration(0);
  };
  return (
    <div style={{ position: 'relative' }}>
      <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder || '选填，可描述整改措施'} rows={3}
        style={{ width: '100%', minHeight: 72, padding: '10px 36px 10px 12px', fontSize: 14, color: C.text, border: `1px solid ${C.line}`, borderRadius: 8, fontFamily: FONT, resize: 'none', outline: 'none', boxSizing: 'border-box', lineHeight: 1.5, background: '#fff' }} />
      <button type="button"
        onMouseDown={(e) => { e.preventDefault(); setRecording(true); setDuration(0); }}
        onMouseUp={stopRecord}
        onMouseLeave={() => { if (recording) stopRecord(); }}
        onTouchStart={(e) => { e.preventDefault(); setRecording(true); setDuration(0); }}
        onTouchEnd={stopRecord}
        title="按住说话"
        style={{
          position: 'absolute', right: 8, bottom: 8, width: 28, height: 28, borderRadius: 14,
          border: recording ? 'none' : `1px solid ${C.line}`, background: recording ? C.danger : '#fff',
          color: recording ? '#fff' : C.textSec, fontSize: 13, cursor: 'pointer', fontFamily: FONT,
          display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 0, lineHeight: 1,
        }}>
        {recording ? `${Math.ceil(duration)}s` : '🎙'}
      </button>
    </div>
  );
}

            background: canConfirm ? C.brand : C.lineStrong, color: canConfirm ? '#fff' : C.textTer,
            fontSize: 15, fontWeight: 600, cursor: canConfirm ? 'pointer' : 'not-allowed', fontFamily: FONT,

function TicketDetail({ ticket, onBack, readOnly = false, auditView = false, adminView = false }) {
  const canOperate = !readOnly && !auditView && ticket.status === '待处理';
  const [actionPanel, setActionPanel] = React.useState(null);
  const [showReassign, setShowReassign] = React.useState(false);
  const [doneMsg, setDoneMsg] = React.useState(null);
  const [fixPanelOpen, setFixPanelOpen] = React.useState(false);
  const [fixPhotos, setFixPhotos] = React.useState([]);
  const [fixDesc, setFixDesc] = React.useState('');
  const [noFixReason, setNoFixReason] = React.useState('');
  const scrollRef = React.useRef(null);
  const [expectedDate, setExpectedDate] = React.useState(ticket.expectedDate || '');
  const [expectedNote, setExpectedNote] = React.useState(ticket.expectedNote || '');
  const [expectedLocked, setExpectedLocked] = React.useState(!!ticket.expectedDate);
  const [expectedEditUsed, setExpectedEditUsed] = React.useState(!!ticket.expectedEditUsed);
  const [reassignDept, setReassignDept] = React.useState(ticket.dept);
  const [reassignReason, setReassignReason] = React.useState('');
  const problemPhotos = getTicketProblemPhotos(ticket);
  const [problemPhotoIndex, setProblemPhotoIndex] = React.useState(0);
  const [photoViewer, setPhotoViewer] = React.useState(null);
  const togglePanel = (panel) => { setShowReassign(false); setActionPanel(prev => (prev === panel ? null : panel)); };
  const openReassign = () => { setActionPanel(null); setShowReassign(true); };
  const addFixPhoto = () => { if (fixPhotos.length < MAX_MEDIA) setFixPhotos(p => [...p, { id: Date.now() }]); };
  const canSubmitFix = fixPhotos.length > 0;
  const canSubmitNoFix = noFixReason.trim().length > 0;
  const canReassign = !!reassignDept && reassignDept !== ticket.dept;
  const elapsedDays = elapsedDaysSince(ticket.time);
  const isPending = ticket.status === '待处理';
  const isRectified = ticket.status === '已整改';
  const resolveDays = getTicketResolveDays(ticket);
  const fixResultPhotos = (ticket.fixPhotos || [{ id: 'f1' }, { id: 'f2' }]).map((p, i) => (
    p.url ? p : { ...p, url: `https://picsum.photos/seed/${ticket.id}fix${i}/360/270` }
  ));
  const [showExpectedPicker, setShowExpectedPicker] = React.useState(false);
  const [pickerDate, setPickerDate] = React.useState('');
  const [pickerNote, setPickerNote] = React.useState('');
  const formatExpectedDate = (d) => (d ? String(d).replace(/-/g, '/') : '');
  const openExpectedPicker = () => {
    setPickerDate(expectedDate || '');
    setPickerNote(expectedNote || '');
    setShowExpectedPicker(true);
  };
  const saveExpectedFromPicker = () => {
    if (!pickerDate) return;
    if (expectedLocked && !expectedEditUsed) setExpectedEditUsed(true);
    setExpectedDate(pickerDate);
    setExpectedNote(pickerNote);
    setExpectedLocked(true);
    setShowExpectedPicker(false);
  };
  const openFixPanel = () => setFixPanelOpen(true);
  const submitFix = () => {
    if (!canSubmitFix) return;
    setDoneMsg({ title: '整改已提交', sub: '工单将进入验收流程' });
  };
  React.useEffect(() => {
    if (fixPanelOpen && scrollRef.current) {
      requestAnimationFrame(() => {
        scrollRef.current.scrollTo({ top: scrollRef.current.scrollHeight, behavior: 'smooth' });
      });
    }
  }, [fixPanelOpen]);
  const actionSheetStyles = {
    mask: { position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.4)', zIndex: 200, display: 'flex', alignItems: 'flex-end' },
    panel: { width: '100%', maxHeight: '65%', background: '#FFFFFF', borderTopLeftRadius: 16, borderTopRightRadius: 16, display: 'flex', flexDirection: 'column' },
    handle: { width: 36, height: 4, borderRadius: 2, background: '#E0E0E0', margin: '12px auto 0' },
    titleRow: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 16px 12px' },
    titleText: { fontSize: 16, fontWeight: 600, color: C.text },
    cancelBtn: { background: 'none', border: 'none', fontSize: 14, color: C.textSec, cursor: 'pointer', fontFamily: FONT },
    divider: { height: 0.5, background: '#EEEEEE' },
    body: { flex: 1, overflowY: 'auto', padding: '16px' },
  };
  if (doneMsg) {
    return (
      <div style={{ flex: 1, background: C.surface, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 28, textAlign: 'center' }}>
        <div style={{ width: 72, height: 72, borderRadius: 36, background: C.successSoft, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20 }}>
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M8 18l7 7 13-13" stroke={C.success} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{ fontSize: 18, fontWeight: 600, color: C.text, marginBottom: 8 }}>{doneMsg.title}</div>
        <div style={{ fontSize: 14, color: C.textSec, lineHeight: 1.7, marginBottom: 24 }}>{doneMsg.sub}</div>
        <button type="button" onClick={onBack} style={{ height: 44, padding: '0 32px', border: 'none', borderRadius: 8, background: C.brand, color: '#fff', fontSize: 15, fontWeight: 600, cursor: 'pointer', fontFamily: FONT }}>返回</button>
      </div>
    );
  }
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.bg, overflow: 'hidden', position: 'relative' }}>
      <TopBar title="工单详情" onBack={onBack} />
      <div ref={scrollRef} style={{ flex: 1, overflow: 'auto', paddingBottom: canOperate ? SCROLL_PAD_STICKY_FOOTER : 16 }}>
        <div style={{ background: C.surface, padding: '16px 16px 14px' }}>
          <div style={{ fontSize: 17, fontWeight: 600, color: C.text, lineHeight: 1.4, marginBottom: 8 }}>{ticket.desc}</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
            <Tag label={ticket.status} />
            {ticket.urgent === '立即处理' ? <UrgentImmediateTag /> : null}
            <span style={{ fontSize: 11, color: C.textTer, fontFamily: MONO, marginLeft: 'auto' }}>{ticket.id}</span>
          </div>
        </div>
        <div style={{ background: C.surface, marginTop: 8 }}>
          <div style={{ fontSize: 12, color: C.textSec, padding: '14px 16px 10px' }}>问题照片</div>
          <SwipePhotoCarousel
            photos={problemPhotos}
            index={problemPhotoIndex}
            onIndexChange={setProblemPhotoIndex}
            onImageClick={(i) => setPhotoViewer({ photos: problemPhotos, index: i, source: 'problem' })}
          />
        </div>
        <div style={{ background: C.surface, marginTop: 8, padding: '14px 16px' }}>
          <div style={{ fontSize: 12, color: C.textSec, marginBottom: 8 }}>问题描述</div>
          <div style={{ fontSize: 14, color: C.text, lineHeight: 1.65 }}>{getTicketDetailDesc(ticket)}</div>
        </div>
        {auditView && (
          <div style={{ background: C.surface, marginTop: 8 }}>
            <div style={{ padding: '14px 16px 10px', fontSize: 13, fontWeight: 600, color: C.text }}>不整改申请</div>
            <Hairline inset={16} />
            <DetailRow k="申请人" v={getTicketAuditApplicantDisplay(ticket)} />
            <Hairline inset={16} />
            <DetailRow k="申请原因" v={ticket.auditReason || '—'} />
            <Hairline inset={16} />
            <DetailRow k="审批状态" v={
              ticket.auditResult === 'approved' ? '已同意'
                : ticket.auditResult === 'rejected' ? '已驳回'
                : '待审批'
            } />
            {ticket.auditResult === 'rejected' && ticket.rejectReason && (
              <>
                <Hairline inset={16} />
                <DetailRow k="驳回理由" v={ticket.rejectReason} />
              </>
            )}
            {ticket.auditTime && (
              <>
                <Hairline inset={16} />
                <DetailRow k="审核时间" v={ticket.auditTime} />
              </>
            )}
          </div>
        )}
        <div style={{ background: C.surface, marginTop: 8 }}>
          <DetailRow k="发现人" v={getTicketDiscovererDisplay(ticket)} />
          <Hairline inset={16} />
          <DetailRow k="提交时间" v={ticket.time} />
          {isPending && (
            <>
              <Hairline inset={16} />
              <DetailRow k="已产生" v={<ElapsedDaysDetailValue days={elapsedDays} status={ticket.status} />} />
            </>
          )}
          {isRectified && (
            <>
              <Hairline inset={16} />
              <DetailRow k="用时" v={<span style={{ color: C.textTer }}>{resolveDays}天</span>} />
            </>
          )}
          <Hairline inset={16} />
          <DetailRow k="责任部门" v={ticket.dept} action={canOperate ? '改派' : undefined} onActionClick={canOperate ? openReassign : undefined} />
          <Hairline inset={16} />
          <DetailRow k="问题类别" v={ticket.cat} />
          <Hairline inset={16} />
          <DetailRow k="所在区域" v={ticket.loc} />
          {ticket.status === '待处理' && (
            <>
              <Hairline inset={16} />
              <div style={{ display: 'flex', alignItems: 'center', minHeight: 48, padding: '0 16px' }}>
                <div style={{ width: 76, fontSize: 13, color: C.textSec, flexShrink: 0 }}>
                  预计完成时间{ticket.needExpectedDate && !expectedLocked ? <span style={{ color: C.danger }}> *</span> : null}
                </div>
                <div style={{ flex: 1, fontSize: 14, color: C.text }}>
                  {expectedLocked ? (
                    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                      <span>{formatExpectedDate(expectedDate)}</span>
                      {!expectedEditUsed && (
                        <button type="button" onClick={openExpectedPicker} style={{ fontSize: 12, color: C.brand, background: 'none', border: `1px solid ${C.brand}`, borderRadius: 4, padding: '3px 8px', cursor: 'pointer', fontFamily: FONT }}>修改</button>
                      )}
                    </span>
                  ) : ticket.needExpectedDate ? (
                    <button type="button" onClick={openExpectedPicker} style={{ background: 'none', border: 'none', padding: 0, color: C.danger, fontSize: 14, cursor: 'pointer', fontFamily: FONT, textAlign: 'left' }}>
                      请填写预计整改时间
                    </button>
                  ) : (
                    <button type="button" onClick={openExpectedPicker} style={{ background: 'none', border: 'none', padding: 0, color: C.textSec, fontSize: 14, cursor: 'pointer', fontFamily: FONT, textAlign: 'left' }}>
                      选填 · 可填写预计完成日期
                    </button>
                  )}
                </div>
              </div>
              {expectedLocked && expectedNote.trim() && (
                <>
                  <Hairline inset={16} />
                  <DetailRow k="补充说明" v={expectedNote} />
                </>
              )}
            </>
          )}
        </div>
        {adminView && <TicketTimelinePanel ticket={ticket} />}
        {isRectified && (
          <div style={{ background: C.surface, marginTop: 8, marginBottom: 16 }}>
            <div style={{ padding: '14px 16px' }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 12 }}>整改结果</div>
              <div style={{ fontSize: 12, color: C.textSec, marginBottom: 10 }}>整改照片</div>
              <MediaThumbStrip photos={fixResultPhotos} max={4} onPhotoClick={(_, i) => setPhotoViewer({ photos: fixResultPhotos, index: i, source: 'fix' })} />
              {ticket.fixDesc && (
                <>
                  <div style={{ fontSize: 12, color: C.textSec, margin: '14px 0 8px' }}>整改说明</div>
                  <div style={{ fontSize: 14, color: C.text, lineHeight: 1.65 }}>{ticket.fixDesc}</div>
                </>
              )}
            </div>
            {ticket.doneTime && (
              <>
                <Hairline inset={16} />
                <DetailRow k="完成时间" v={ticket.doneTime} />
              </>
            )}
          </div>
        )}
      </div>
      {canOperate && (
        <div style={STICKY_FOOTER_STYLE}>
          {fixPanelOpen && (
            <div style={{ marginBottom: 8, padding: '12px', borderRadius: 8, border: `0.5px solid ${C.line}`, background: C.surfaceAlt, maxHeight: '45vh', overflowY: 'auto' }}>
              <button type="button" onClick={() => setFixPanelOpen(false)} style={{ display: 'block', width: '100%', marginBottom: 12, padding: 0, background: 'none', border: 'none', fontSize: 13, color: C.textSec, cursor: 'pointer', fontFamily: FONT, textAlign: 'center' }}>收起</button>
              <div style={{ fontSize: 12, color: C.textSec, marginBottom: 8 }}>整改照片<span style={{ color: C.danger }}> *</span> <span style={{ color: C.textTer }}>（至少 1 张）</span></div>
              <MediaThumbStrip photos={fixPhotos} onAdd={addFixPhoto} onRemove={i => setFixPhotos(p => p.filter((_, j) => j !== i))} />
              <div style={{ fontSize: 12, color: C.textSec, margin: '14px 0 8px' }}>整改说明</div>
              <VoiceInputBar value={fixDesc} onChange={setFixDesc} placeholder="选填，可描述整改措施" />
            </div>
          )}
          {actionPanel === 'no-fix' && (
            <div style={{ marginBottom: 8, padding: '12px', borderRadius: 8, border: `0.5px solid ${C.line}`, background: C.surfaceAlt, maxHeight: 300, overflowY: 'auto' }}>

                style={{ width: '100%', minHeight: 96, padding: '10px 12px', fontSize: 14, color: C.text, border: `1px solid ${C.line}`, borderRadius: 8, fontFamily: FONT, resize: 'none', outline: 'none', boxSizing: 'border-box', lineHeight: 1.5 }} />
              <button type="button" disabled={!canSubmitNoFix} onClick={() => setDoneMsg({ title: '已提交审核', sub: '等待景区负责人（朱丽锋）审批' })} style={{ ...STICKY_PRIMARY_BTN, marginTop: 14, background: canSubmitNoFix ? C.brand : C.lineStrong, color: canSubmitNoFix ? '#fff' : C.textTer, fontSize: 15, fontWeight: 600, cursor: canSubmitNoFix ? 'pointer' : 'not-allowed' }}>提交审核</button>
              <div style={{ fontSize: 11, color: C.textTer, textAlign: 'center', marginTop: 8, lineHeight: 1.5 }}>提交后将发送至景区负责人（朱丽锋）审核</div>
            </div>
          )}
          <button type="button" disabled={fixPanelOpen && !canSubmitFix} onClick={fixPanelOpen ? submitFix : openFixPanel} style={{
            ...STICKY_PRIMARY_BTN,
            background: fixPanelOpen ? (canSubmitFix ? C.brand : C.lineStrong) : C.brand,
            color: fixPanelOpen ? (canSubmitFix ? '#fff' : C.textTer) : '#fff',
            fontSize: 16, fontWeight: 600,
            cursor: fixPanelOpen ? (canSubmitFix ? 'pointer' : 'not-allowed') : 'pointer',
          }}>{fixPanelOpen ? '确认完成' : '上传整改'}</button>
          <button type="button" onClick={() => togglePanel('no-fix')} style={{
            width: '100%', marginTop: 8, padding: '4px 0', background: 'none', border: 'none',
            fontSize: 12, color: C.textTer, cursor: 'pointer', fontFamily: FONT, textAlign: 'center',
          }}>该问题无需整改？申请不整改</button>
        </div>
      )}
      {showReassign && (
        <ReassignModal currentDept={ticket.dept} dept={reassignDept} onDeptChange={setReassignDept} reason={reassignReason} onReasonChange={setReassignReason}
          onCancel={() => setShowReassign(false)} onConfirm={() => { if (!canReassign) return; setShowReassign(false); setDoneMsg({ title: '改派成功', sub: `工单已改派至 ${reassignDept}` }); }} canConfirm={canReassign} />
      )}
      {ticket.status === '待处理' && showExpectedPicker && (
        <div style={actionSheetStyles.mask} onClick={() => setShowExpectedPicker(false)}>
          <div style={actionSheetStyles.panel} onClick={e => e.stopPropagation()}>
            <div style={actionSheetStyles.handle} />
            <div style={actionSheetStyles.titleRow}>
              <div style={actionSheetStyles.titleText}>{expectedLocked ? '修改预计完成时间' : (ticket.needExpectedDate ? '填写预计整改时间' : '填写预计完成时间')}</div>
              <button type="button" onClick={() => setShowExpectedPicker(false)} style={actionSheetStyles.cancelBtn}>取消</button>
            </div>
            <div style={actionSheetStyles.divider} />
            <div style={actionSheetStyles.body}>
              <div style={{ fontSize: 12, color: C.textSec, marginBottom: 8 }}>预计完成日期{ticket.needExpectedDate ? <span style={{ color: C.danger }}> *</span> : null}</div>
              <input type="date" value={pickerDate} onChange={e => setPickerDate(e.target.value)}
                style={{ width: '100%', height: 44, padding: '0 12px', fontSize: 14, color: C.text, border: `1px solid ${C.line}`, borderRadius: 8, background: C.surfaceAlt, fontFamily: FONT, outline: 'none', marginBottom: 14, boxSizing: 'border-box' }} />
              <div style={{ fontSize: 12, color: C.textSec, marginBottom: 8 }}>补充说明（选填）</div>
              <textarea value={pickerNote} onChange={e => setPickerNote(e.target.value)} placeholder="可补充整改计划、注意事项等…" rows={3}
                style={{ width: '100%', minHeight: 72, padding: '10px 12px', fontSize: 14, color: C.text, border: `1px solid ${C.line}`, borderRadius: 8, fontFamily: FONT, resize: 'none', outline: 'none', boxSizing: 'border-box', lineHeight: 1.5, marginBottom: 4 }} />

                <div style={{ fontSize: 11, color: C.textTer, marginBottom: 8 }}>保存后将不可再次修改</div>

            </div>
          </div>
        </div>
      )}
      {photoViewer && (
        <PhotoFullscreenViewer
          photos={photoViewer.photos}
          index={photoViewer.index}
          onClose={() => setPhotoViewer(null)}
          onIndexChange={(i) => {
            setPhotoViewer(v => (v ? { ...v, index: i } : null));
            if (photoViewer.source === 'problem') setProblemPhotoIndex(i);
          }}
        />
      )}
    </div>
  );
}

function MyTicketsScreen({ tickets, onBack, onTicketClick, listState, onListStateChange }) {
  const user = window.DATA.currentUser || CURRENT_USER;
  const scrollRef = React.useRef(null);
  const { scopeTab, statusFilter, timeRange, q, scrollTop } = listState;
  const patchListState = (patch) => onListStateChange({ ...listState, ...patch });
  React.useLayoutEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollTop || 0;
  }, []);
  const handleOpenTicket = (t) => {
    const st = scrollRef.current ? scrollRef.current.scrollTop : 0;
    onListStateChange({ ...listState, scrollTop: st });
    onTicketClick(t);
  };
  const scopeTabs = ['我上报的', '待我处理'];
  const statusFilters = ['全部', '待处理', '已整改', '不整改'];
  const matchSearch = (t) => !q.trim() || [t.desc, t.loc, t.who, t.id, t.dept].some(s => String(s).includes(q.trim()));
  const filterList = (scope, status, range = timeRange) => tickets.filter(t => {
    const scopeOk = scope === '我上报的'
      ? t.who === user.name
      : t.dept === user.dept && t.status === '待处理';
    const statusOk = status === '全部' ? true
      : status === '待处理' ? t.status === '待处理'
      : t.status === status;
    const rangeOk = isTicketInTimeRange(t, range);
    return scopeOk && statusOk && rangeOk && matchSearch(t);
  });
  const list = filterList(scopeTab, statusFilter).sort((a, b) => (b.overdueDays || 0) - (a.overdueDays || 0));
  const tabStyle = (active) => ({
    flex: 1, textAlign: 'center', padding: '10px 0', fontSize: 14,
    fontWeight: active ? 600 : 400, color: active ? C.brand : C.textSec, cursor: 'pointer',
    borderBottom: active ? `2px solid ${C.brand}` : '2px solid transparent', fontFamily: FONT,
  });

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.bg, overflow: 'hidden' }}>
      <TopBar title="我的工单" onBack={onBack} />
      <div style={{ background: C.surface, borderBottom: `0.5px solid ${C.line}`, flexShrink: 0 }}>
        <div style={{ display: 'flex' }}>
          {scopeTabs.map(g => (
            <div key={g} style={tabStyle(scopeTab === g)} onClick={() => patchListState({ scopeTab: g, scrollTop: 0 })}>
              {g} ({filterList(g, statusFilter).length})
            </div>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 6, padding: '10px 16px 10px' }}>
          {statusFilters.map(s => (
            <button key={s} onClick={() => patchListState({ statusFilter: s, scrollTop: 0 })} style={{
              flex: 1, padding: '6px 4px', borderRadius: 14, border: 'none', cursor: 'pointer', fontFamily: FONT, fontSize: 12,
              background: statusFilter === s ? C.brandSoft : C.surfaceAlt,
              color: statusFilter === s ? C.brand : C.textSec,
              fontWeight: statusFilter === s ? 600 : 400,
            }}>{s}</button>
          ))}
        </div>
        <div style={{ padding: '0 16px 12px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8, height: 32, padding: '0 10px', background: C.surfaceAlt, borderRadius: 6 }}>
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke={C.textTer} strokeWidth="1.4"/><path d="M11 11l3 3" stroke={C.textTer} strokeWidth="1.4" strokeLinecap="round"/></svg>
              <input value={q} onChange={e => patchListState({ q: e.target.value, scrollTop: 0 })} placeholder="搜索工单描述、区域…"
                style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 13, fontFamily: FONT, color: C.text }} />

function NotificationsScreen({ items, managementNotify, onBack, onOpenTicket, onOpenAudit, onMarkRead, onDelete, listState, onListStateChange }) {
  const scrollRef = React.useRef(null);
  const { filter, scrollTop } = listState;
  const patchState = (patch) => onListStateChange({ ...listState, ...patch });
  React.useLayoutEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollTop || 0;
  }, []);
  React.useEffect(() => {
    if (managementNotify && filter === '滞留提醒') patchState({ filter: '全部', scrollTop: 0 });
  }, [managementNotify]);
  const filters = managementNotify ? ['全部', '审批相关', '系统'] : ['全部', '滞留提醒', '系统'];
  const recentItems = items.filter(isNotificationInRecentMonth);
  const filtered = recentItems.filter(n => {
    if (filter === '全部') return true;
    if (managementNotify) {
      if (filter === '审批相关') return n.type === 'audit';
      return n.type === 'system';
    }
    if (filter === '滞留提醒') return n.type === 'detained';
    return n.type === 'system';
  });
  const groups = ['今天', '昨天', '更早'];
  const grouped = groups.map(g => ({ label: g, items: filtered.filter(n => n.group === g) })).filter(g => g.items.length > 0);

  const handleClick = (n) => {
    onMarkRead(n.id);
    const st = scrollRef.current ? scrollRef.current.scrollTop : 0;
    onListStateChange({ ...listState, scrollTop: st });
    if (n.type === 'audit' && onOpenAudit) {
      onOpenAudit(n);
    } else if (n.type === 'detained' && n.ticketId) {
      onOpenTicket(n.ticketId);
    } else if (n.type === 'system' && n.ticketId) {
      onOpenTicket(n.ticketId);
    }
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.bg, overflow: 'hidden' }}>
      <TopBar title="消息通知" onBack={onBack} />
      <div style={{ display: 'flex', gap: 6, padding: '10px 16px', background: C.surface, borderBottom: `0.5px solid ${C.line}`, flexShrink: 0, overflowX: 'auto' }}>
        {filters.map(f => (
          <button key={f} onClick={() => patchState({ filter: f, scrollTop: 0 })} style={{
            flexShrink: 0, padding: '6px 12px', borderRadius: 14, border: 'none', cursor: 'pointer', fontFamily: FONT, fontSize: 12,
            background: filter === f ? C.brandSoft : C.surfaceAlt,
            color: filter === f ? C.brand : C.textSec,
            fontWeight: filter === f ? 600 : 400,
          }}>{f}</button>
        ))}
      </div>
      <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto' }}>
        {grouped.length === 0 && (
          <div style={{ padding: 60, textAlign: 'center', color: C.textTer, fontSize: 13 }}>近1个月暂无通知</div>
        )}
        {grouped.map(g => (
          <div key={g.label}>
            <div style={{ padding: '8px 16px', fontSize: 12, color: C.textTer, background: C.surfaceAlt }}>{g.label}</div>
            <div style={{ background: C.surface }}>
              {g.items.map((n, i) => (
                <SwipeableNotificationRow
                  key={n.id}
                  isLast={i === g.items.length - 1}
                  onDelete={() => onDelete && onDelete(n.id)}
                  onClick={() => handleClick(n)}
                >
                  <div style={{
                    minHeight: 64, padding: 16,
                    display: 'flex', gap: 10, alignItems: 'flex-start',
                  }}>
                    <div style={{ width: 6, height: 6, borderRadius: 3, marginTop: 6, flexShrink: 0, background: n.unread ? C.brand : 'transparent' }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', gap: 8, alignItems: 'flex-start' }}>
                        <div style={{ fontSize: 14, fontWeight: 400, color: C.text, lineHeight: 1.45, flex: 1 }}>{n.title}</div>
                        <span style={{ fontSize: 12, color: C.textTer, flexShrink: 0 }}>{n.time}</span>
                      </div>
                      <div style={{ fontSize: 13, color: n.detained ? C.danger : C.textSec, marginTop: 4, lineHeight: 1.45 }}>{n.sub}</div>
                    </div>
                  </div>
                </SwipeableNotificationRow>
              ))}
            </div>
          </div>
        ))}
        <div style={{ padding: 24, textAlign: 'center', fontSize: 12, color: C.textTer }}>仅显示近1个月的通知</div>
      </div>
    </div>
  );
}

function getMeReminder(userType, user) {
  const cardStyle = { bg: C.warnSoft, borderColor: C.warn };
  if (userType === 'dutyOff') {
    const nextDutyDate = '5月4日';
    if (!nextDutyDate) return null;
    return { ...cardStyle, text: `下次值班 ${nextDutyDate}，记得提前查看检查项` };
  }
  if (userType === 'receiver') {
    const count = TICKETS.filter(t => t.dept === user.dept && t.status === '待处理').length;
    if (count <= 0) return null;
    return { ...cardStyle, text: `你部门有 ${count} 条工单待处理，请及时跟进` };
  }
  return null;
}

/** 接单人「处理工单数」：本部门已整改工单数（来自 TICKETS） */
function countDeptProcessedTickets(dept) {
  return TICKETS.filter(t => t.dept === dept && t.status === '已整改').length;
}

function getMeMonthlyStatCards(userType, counts) {
  const {
    monthlyReportCount,
    monthlyAuditReviewedCount,
    dutyDaysCount,
    processedTicketCount,
    avgProcessDays,
  } = counts;

  const valueMap = {
    reported: monthlyReportCount,
    audited: monthlyAuditReviewedCount,
    dutyDays: dutyDaysCount,
    processed: processedTicketCount,
    avgProcessDays: Number(avgProcessDays).toFixed(1),
  };

  const configKey = isManagementRole(userType) ? 'management'
    : userType === 'receiver' ? 'receiver'
    : 'qjOff';
  const config = ROLE_STAT_CONFIG[configKey];

  return {
    sectionTitle: config.sectionTitle,
    cards: config.fields.map(f => ({
      key: f.key,
      v: valueMap[f.key],
      l: f.label,
      action: f.action,
      suffix: f.key === 'avgProcessDays' ? '天' : null,
    })),
  };
}

function CalendarScreen({ onBack, viewOnly = false }) {
  const user = (window.DATA.currentUser || CURRENT_USER).name;
  const month = '2026年4月';
  const today = 29;
  const roster = ['李宛婷', '周莉', '杨诚', '方力', '张明', '景文峰', '苏桢'];
  const calToday = '#2563EB';
  const calMineBg = '#EFF6FF';
  const calGrid = '#F3F4F6';
  const calServiceGreen = C.success;
  const calCellH = 62;
  const WEEK_LABELS = ['一', '二', '三', '四', '五', '六', '日'];

  const weekdayIdx = (d) => (d + 1) % 7;
  const weekLabel = (d) => '周' + WEEK_LABELS[weekdayIdx(d)];

  const days = [];
  for (let d = 1; d <= 30; d++) {
    let qaManager = roster[(d * 2 + Math.floor(d / 5)) % roster.length];
    let serviceManager = roster[(d * 3 + 1) % roster.length];
    if (!viewOnly) {
      if (d === today) qaManager = user;
      if (d === 14) serviceManager = user;
    }
    if (d % 7 === 0) serviceManager = qaManager;
    days.push({ d, qaManager, serviceManager, isToday: d === today, isFuture: d > today });
  }

  const [selectedDay, setSelectedDay] = React.useState(today);
  const selected = days.find(d => d.d === selectedDay) || days.find(d => d.isToday);

  const isMyDuty = (day) => !viewOnly && !day.isFuture && (day.qaManager === user || day.serviceManager === user);
  const myDutyDays = days.filter(isMyDuty).length;

  const getDayStyle = (day) => {
    if (viewOnly) {
      if (day.isFuture) {
        return { bg: '#fff', dateColor: '#9CA3AF', dateWeight: 500 };
      }
      return { bg: '#fff', dateColor: '#374151', dateWeight: 500 };
    }
    const mine = isMyDuty(day);
    if (mine) {
      return { bg: calMineBg, dateColor: calToday, dateWeight: 700 };
    }
    if (day.isFuture) {
      return { bg: '#fff', dateColor: '#9CA3AF', dateWeight: 500 };
    }
    return { bg: '#fff', dateColor: '#374151', dateWeight: 500 };
  };

  // 4 字以上姓名会截断,符合预期(绝大多数为三字以内)
  const renderDayNames = (day) => {
    const qa = day.qaManager;
    const svc = day.serviceManager;
    if (!qa && !svc) return null;
    if (qa && svc && qa === svc) {
      return (
        <div style={{ marginTop: 2, width: '100%', padding: '0 1px' }}>
          <div style={{
            fontSize: 11, lineHeight: 1.25, textAlign: 'left', color: calToday,
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>{qa}</div>
          <div style={{ fontSize: 10, lineHeight: 1.2, color: C.textTer, marginTop: 1 }}>质/服</div>
        </div>
      );
    }
    return (
      <div style={{ marginTop: 2, width: '100%', padding: '0 1px' }}>
        {qa && (
          <div style={{
            fontSize: 11, lineHeight: 1.25, textAlign: 'left', color: calToday,
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>{qa}</div>
        )}
        {svc && (
          <div style={{
            fontSize: 11, lineHeight: 1.25, textAlign: 'left', color: calServiceGreen,
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', marginTop: qa ? 2 : 0,
          }}>{svc}</div>
        )}
      </div>
    );
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: C.bg, overflow: 'hidden' }}>
      <TopBar title="巡检日历" onBack={onBack} />
      <div style={{ flex: 1, overflow: 'auto' }}>
        <div style={{ background: C.surface, padding: '18px 16px 14px' }}>
          {viewOnly ? (
            <div style={{ textAlign: 'center', fontSize: 13, color: C.textSec, lineHeight: 1.5 }}>查看每日值班安排</div>
          ) : (
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 28, fontWeight: 600, color: C.text, fontFamily: MONO, lineHeight: 1, marginBottom: 6 }}>{myDutyDays}</div>
              <div style={{ fontSize: 12, color: C.textTer }}>出勤天数</div>
            </div>
          )}
        </div>
        <div style={{ background: C.surface, marginTop: 8, padding: '14px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: `0.5px solid ${C.line}` }}>
          <button style={{ background: 'none', border: 'none', padding: 4, cursor: 'pointer' }}>
            <svg width="8" height="14" viewBox="0 0 8 14"><path d="M7 1L1 7l6 6" stroke={C.text} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          <div style={{ fontSize: 15, fontWeight: 600, color: C.text }}>{month}</div>
          <button style={{ background: 'none', border: 'none', padding: 4, cursor: 'pointer' }}>
            <svg width="8" height="14" viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" stroke={C.text} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
        </div>
        <div style={{ background: C.surface, padding: '10px 12px 18px' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 20, marginBottom: 10 }}>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 11, color: C.textTer }}>
              <span style={{ width: 6, height: 6, borderRadius: 3, background: calToday, flexShrink: 0 }} />
              质检经理
            </span>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, fontSize: 11, color: C.textTer }}>
              <span style={{ width: 6, height: 6, borderRadius: 3, background: calServiceGreen, flexShrink: 0 }} />
              服务经理
            </span>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', marginBottom: 6 }}>
            {WEEK_LABELS.map(w => (
              <div key={w} style={{ textAlign: 'center', fontSize: 11, color: C.textTer, padding: '4px 0' }}>{w}</div>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 1, background: calGrid }}>
            {[null, null].map((_, i) => (
              <div key={`e${i}`} style={{ minHeight: calCellH, background: '#fff' }} />
            ))}
            {days.map(day => {
              const s = getDayStyle(day);
              const isSelected = selectedDay === day.d;
              return (
                <div
                  key={day.d}
                  role="button"
                  tabIndex={0}
                  onClick={() => setSelectedDay(day.d)}
                  style={{
                    minHeight: calCellH, display: 'flex', flexDirection: 'column', alignItems: 'stretch',
                    padding: '4px 3px', background: s.bg, cursor: 'pointer',
                    boxShadow: isSelected ? `inset 0 0 0 1.5px ${calToday}` : 'none',
                  }}
                >
                  <div style={{
                    fontSize: 12, fontWeight: s.dateWeight, fontFamily: MONO, lineHeight: 1,
                    color: s.dateColor, alignSelf: 'flex-start',
                  }}>{day.d}</div>
                  {renderDayNames(day)}
                </div>
              );
            })}
          </div>
        </div>
        {selected && (
          <div style={{ background: C.surface, marginTop: 8, padding: '14px 16px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
              <span style={{ fontSize: 14, fontWeight: 600, color: C.text }}>
                4月{selected.d}日 · {weekLabel(selected.d)}
              </span>
              {selected.isToday && (
                <span style={{
                  fontSize: 10, fontWeight: 500, color: calToday, background: calMineBg,
                  padding: '2px 6px', borderRadius: 4,
                }}>今日</span>
              )}
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: C.text, lineHeight: 1.6 }}>
              <span style={{ width: 6, height: 6, borderRadius: 3, background: calToday, flexShrink: 0 }} />
              <span style={{ color: C.textTer, flexShrink: 0 }}>质检经理</span>
              <span>{selected.qaManager || '—'}</span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: C.text, lineHeight: 1.6, marginTop: 6 }}>
              <span style={{ width: 6, height: 6, borderRadius: 3, background: calServiceGreen, flexShrink: 0 }} />
              <span style={{ color: C.textTer, flexShrink: 0 }}>服务经理</span>
              <span>{selected.serviceManager || '—'}</span>
            </div>
          </div>
        )}
        <div style={{ height: 20 }} />
      </div>
    </div>
  );
}
